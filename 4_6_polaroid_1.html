<!DOCTYPE html>

<head>

  <title>6寸竖版单拍立得</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Long+Cang&family=Ma+Shan+Zheng&family=Pacifico&family=ZCOOL+KuaiLe&family=ZCOOL+QingKe+HuangYou&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <style>
    :root {
      --canvas-w: 600px;
      --canvas-h: 900px;
      --card-w: 460px;
      --card-h: 720px;
      --caption-space: 120px;
      --caption-min-h: 82px;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      margin: 0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: contain;
      background: #f8fafc;
    }
    .canvas-viewport {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 8px;
      min-height: 0;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      background: #f8fafc;
    }
    .canvas-scaler { transform-origin: top center; transition: transform 0.2s ease; }
    .photo-canvas { width: var(--canvas-w); height: var(--canvas-h); position: relative; overflow: hidden; background: #fff; }
    .polaroid {
      position: absolute;
      width: var(--card-w);
      height: var(--card-h);
      box-sizing: border-box;
      padding: 14px 14px var(--caption-space) 14px;
      background: #fff;
    }
    .polaroid.active { box-shadow: inset 0 0 0 4px #3b82f6; }
    .photo-area { width: 100%; height: 100%; background: #f1f5f9; overflow: hidden; position: relative; }
    .photo-area img { position: absolute; top: 0; left: 0; transform-origin: center center; max-width: none !important; max-height: none !important; display: none; pointer-events: none; }
    .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      border: 1px dashed #cbd5e1;
      font-size: 12px;
      font-weight: 700;
    }
    .caption {
      position: absolute;
      left: 20px;
      right: 20px;
      bottom: 14px;
      min-height: var(--caption-min-h);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 6px;
      pointer-events: none;
    }
    .caption.double-line { transform: translateY(-4px); }
    .caption-line {
      max-width: 100%;
      color: #334155;
      white-space: nowrap;
      /* 必须改为 visible，否则马善政等手写体会切掉一半 */
      overflow: visible !important; 
      line-height: 1.35; /* 稍微加大行高 */
      display: block;
      text-align: center;
    }
    .caption-line.line1 { font-size: 34px; }
    .caption-line.line2 { font-size: 26px; display: none; margin-top: 4px; }

    .crop-modal { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
    #cropWrapper { position: relative; transform-origin: center center; background: #111; overflow: hidden; flex-shrink: 0; }
    #cropPreviewImg { position: absolute; top: 0; left: 0; cursor: move; touch-action: none; transform-origin: center center; max-width: none !important; max-height: none !important; }
    #cropBox { position: absolute; inset: 0; border: 2px solid #3b82f6; box-shadow: 0 0 0 5000px rgba(0,0,0,0.8); z-index: 20; pointer-events: none; }

    .safe-bottom { padding-bottom: max(12px, env(safe-area-inset-bottom)); }
    #exportLoading { display: none; position: fixed; inset: 0; background: rgba(2,6,23,0.8); z-index: 2000; color: #fff; align-items: center; justify-content: center; flex-direction: column; }
    input[type=range] { -webkit-appearance: none; background: transparent; }
    input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; background: #333; border-radius: 3px; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #3b82f6; margin-top: -8px; }

    .font-picker-btn {
      width: 100%;
      min-height: 44px;
      font-size: 14px;
      line-height: 1.2;
      border: 1px solid #cbd5e1;
      border-radius: 0.5rem;
      background: #fff;
      padding: 10px 36px 10px 10px;
      text-align: left;
      position: relative;
      cursor: pointer;
    }
    .font-picker-btn::after {
      content: "▾";
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      font-size: 12px;
      pointer-events: none;
    }
    .font-picker-btn.disabled { opacity: 0.5; cursor: not-allowed; }
    .font-menu {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 4px);
      max-height: 220px;
      overflow: auto;
      background: #fff;
      border: 1px solid #cbd5e1;
      border-radius: 0.5rem;
      box-shadow: 0 10px 24px rgba(0,0,0,0.12);
      z-index: 9999;
    }
    .font-menu.up { top: auto; bottom: calc(100% + 4px); }
    .font-menu button { width: 100%; border: none; background: #fff; text-align: left; padding: 10px; font-size: 14px; cursor: pointer; }
    .font-menu button:hover { background: #f1f5f9; }
  </style>
</head>

    </div>
    <div class="flex items-center gap-2">
      <button onclick="openMarginModal()" class="bg-gray-200 text-gray-700 px-4 py-1.5 rounded-full text-xs font-bold shadow-md active:scale-95 transition">边距</button>
      <button onclick="exportPhoto()" class="bg-blue-600 text-white px-4 py-1.5 rounded-full text-xs font-bold shadow-md active:scale-95 transition">导出</button>

  </header>

          <div class="caption">
            <div id="captionLine1" class="caption-line line1"></div>
            <div id="captionLine2" class="caption-line line2"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

        </div>
      </div>
    </div>

  <div id="marginModal" class="crop-modal">
    <div class="p-4 flex justify-between items-center bg-black/80 backdrop-blur">
      <button onclick="closeMarginModal()" class="text-white/40 text-sm px-2">取消</button>
      <span class="text-white text-xs font-bold tracking-widest uppercase">设置边距</span>
      <button onclick="applyMargin()" class="bg-blue-600 text-white px-5 py-2 rounded-full text-xs font-bold">保存</button>
    </div>
    <div class="p-8 bg-zinc-950">
      <div class="max-w-xs mx-auto space-y-8">

          <input type="range" id="marginH" min="0" max="120" step="1" oninput="updateMarginPreview()" class="w-full">
        </div>
        <div>

  <div id="cropModal" class="crop-modal">
    <div class="p-4 flex justify-between items-center bg-black/80 backdrop-blur">

    </div>
    <div class="p-8 bg-zinc-950">

    function updateCardGeometry(v = marginVValue) {
      const root = document.documentElement;
      const cardH = Math.max(640, Math.min(820, 840 - v));
      const captionSpace = Math.max(110, Math.min(170, 170 - Math.floor(v * 0.5)));
      const captionMinH = Math.max(74, captionSpace - 28);
      frameH = cardH - 14 - captionSpace;
      root.style.setProperty("--card-h", `${cardH}px`);
      root.style.setProperty("--caption-space", `${captionSpace}px`);
      root.style.setProperty("--caption-min-h", `${captionMinH}px`);
    }
    function updateCardLayout(h = marginHValue, v = marginVValue) {
      const card = document.getElementById("card1");
      card.style.left = `${h}px`;
      card.style.top = `${v}px`;
    }
    function updateCanvasSize(h = marginHValue, v = marginVValue) {
      const cardH = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--card-h"), 10) || 720;
      document.documentElement.style.setProperty("--canvas-w", `${460 + h * 2}px`);
      document.documentElement.style.setProperty("--canvas-h", `${cardH + v * 2}px`);
      autoScaleCanvas();
    }
    function openMarginModal() {
      previewMarginH = marginHValue; previewMarginV = marginVValue;
      document.getElementById("marginH").value = previewMarginH;
      document.getElementById("marginV").value = previewMarginV;
      marginHLabel.innerText = previewMarginH; marginVLabel.innerText = previewMarginV;
      marginModal.style.display = "flex";
    }
    function closeMarginModal() { updateCardLayout(marginHValue, marginVValue); updateCanvasSize(marginHValue, marginVValue); marginModal.style.display = "none"; }
    function updateMarginPreview() {
      previewMarginH = parseInt(document.getElementById("marginH").value, 10) || 0;
      previewMarginV = parseInt(document.getElementById("marginV").value, 10) || 0;
      marginHLabel.innerText = previewMarginH; marginVLabel.innerText = previewMarginV;
      updateCardGeometry(previewMarginV); updateCardLayout(previewMarginH, previewMarginV); updateCanvasSize(previewMarginH, previewMarginV);
    }
    function applyMargin() {
      marginHValue = previewMarginH; marginVValue = previewMarginV;
      updateCardGeometry(marginVValue); updateCardLayout(); updateCanvasSize(); closeMarginModal();
    }

    function autoScaleCanvas() {
      const v = document.querySelector(".canvas-viewport");
      const s = document.getElementById("scaler");
      const a = document.getElementById("captureArea");
      const scale = Math.min((v.clientWidth - 20) / a.offsetWidth, (v.clientHeight - 4) / a.offsetHeight, 1);
      s.style.transform = `scale(${scale})`;
    }
    function uploadPhoto() { file1.value = ""; file1.click(); }
    function applyImageState() { const img = document.querySelector("#card1 img"); img.style.transform = `translate(${photoState.x}px, ${photoState.y}px) rotate(${photoState.rotate}deg) scale(${photoState.scale})`; }
    function handleFile(event) {
      const file = event.target.files[0]; if (!file) return;
      const rd = new FileReader();
      rd.onload = (e) => {
        const img = document.querySelector("#card1 img");
        const ph = document.querySelector("#card1 .placeholder");
        img.src = e.target.result; img.style.display = "block"; ph.style.display = "none";
        img.onload = () => {
          const fit = Math.max(frameW / img.naturalWidth, frameH / img.naturalHeight);
          photoState.x = (frameW - img.naturalWidth) / 2; photoState.y = (frameH - img.naturalHeight) / 2; photoState.scale = fit; photoState.rotate = 0;
          applyImageState();
        };
      };
      rd.readAsDataURL(file);
    }

    function renderFontMenus() {
      font1Menu.innerHTML = FONT_OPTIONS.map(f => `<button type="button" onclick="setFont(1,'${f.value.replace(/'/g, "\\'")}','${f.label}')">${f.label}</button>`).join("");
      font2Menu.innerHTML = FONT_OPTIONS.map(f => `<button type="button" onclick="setFont(2,'${f.value.replace(/'/g, "\\'")}','${f.label}')">${f.label}</button>`).join("");
    }
    function closeFontMenus() { font1Menu.classList.add("hidden"); font2Menu.classList.add("hidden"); }
    function toggleFontMenu(line, e) {
      e.stopPropagation();
      const btn = document.getElementById(`font${line}Btn`);
      if (btn.classList.contains("disabled")) return;
      const menu = document.getElementById(`font${line}Menu`);
      const open = menu.classList.contains("hidden");
      closeFontMenus();
      if (open) {
        const r = btn.getBoundingClientRect();
        menu.classList.toggle("up", (window.innerHeight - r.bottom) < 232);
        menu.classList.remove("hidden");
      }
    }
    function setFont(line, value, label) {
      const btn = document.getElementById(`font${line}Btn`);
      btn.dataset.value = value; btn.textContent = label;
      closeFontMenus(); updateCaptionFromControls();
    }
    function getFontLabel(v) { const f = FONT_OPTIONS.find(x => x.value === v); return f ? f.label : "选择字体"; }
    function syncControls() {
      line1Input.value = textState.line1; line2Enable.checked = textState.line2Enabled; line2Input.value = textState.line2;
      line2Input.disabled = !textState.line2Enabled; font2Btn.classList.toggle("disabled", !textState.line2Enabled);
      font1Btn.dataset.value = textState.font1; font2Btn.dataset.value = textState.font2;
      font1Btn.textContent = getFontLabel(textState.font1); font2Btn.textContent = getFontLabel(textState.font2);
    }
    function renderCaption() {
      captionLine1.innerText = textState.line1 || " "; captionLine1.style.fontFamily = textState.font1;
      captionLine2.innerText = textState.line2 || " "; captionLine2.style.fontFamily = textState.font2;
      captionLine2.style.display = textState.line2Enabled ? "block" : "none";
      captionLine1.parentElement.classList.toggle("double-line", textState.line2Enabled);
    }
    function updateCaptionFromControls() {
      textState.line1 = line1Input.value.trim();
      textState.line2Enabled = line2Enable.checked;
      textState.line2 = line2Input.value.trim();
      textState.font1 = font1Btn.dataset.value;
      textState.font2 = font2Btn.dataset.value;
      renderCaption();
    }
    function toggleSecondLine() {
      line2Input.disabled = !line2Enable.checked;
      font2Btn.classList.toggle("disabled", !line2Enable.checked);
      if (!line2Enable.checked) closeFontMenus();
      updateCaptionFromControls();
    }
    function pickRandomText() { return TEXT_POOL[Math.floor(Math.random() * TEXT_POOL.length)]; }
    function pickRandomFont() { return FONT_OPTIONS[Math.floor(Math.random() * FONT_OPTIONS.length)]; }
    function randomizeText() {
      textState.line1 = pickRandomText();
      textState.font1 = pickRandomFont().value;
      if (textState.line2Enabled) { textState.line2 = pickRandomText(); textState.font2 = pickRandomFont().value; }
      syncControls(); renderCaption();
    }

    function recalcCropViewScale() {
      const rect = cropViewport.getBoundingClientRect();
      const vw = Math.max(rect.width - 24, 240), vh = Math.max(rect.height - 24, 180);
      viewScale = Math.min(vw / frameW, vh / frameH, 1);
      cropWrapper.style.width = `${frameW}px`; cropWrapper.style.height = `${frameH}px`; cropWrapper.style.transform = `scale(${viewScale})`;
    }
    function renderCropPreview() { cropPreviewImg.style.transform = `translate(${cropTemp.x}px, ${cropTemp.y}px) rotate(${cropTemp.rotate}deg) scale(${cropTemp.scale})`; }
    function openCropModal() {
      const img = document.querySelector("#card1 img");
      if (!img.getAttribute("src")) return uploadPhoto();
      cropNaturalW = img.naturalWidth; cropNaturalH = img.naturalHeight;
      cropTemp = { ...photoState, isDragging: false, lastX: 0, lastY: 0 };
      cropZoom.min = (cropTemp.scale * 0.1).toFixed(4); cropZoom.max = (cropTemp.scale * 10).toFixed(4); cropZoom.value = cropTemp.scale;
      cropRotate.value = cropTemp.rotate || 0; cropPreviewImg.src = img.src; cropModal.style.display = "flex";
      requestAnimationFrame(() => { recalcCropViewScale(); updateCropTransform(); });
    }
    function closeCropModal() { cropModal.style.display = "none"; }
    function clampCropPosition() {
      if (!cropNaturalW) return;
      const r = cropTemp.rotate * Math.PI / 180, cosR = Math.abs(Math.cos(r)), sinR = Math.abs(Math.sin(r));
      const minS = Math.max(frameW / (cropNaturalW * cosR + cropNaturalH * sinR), frameH / (cropNaturalW * sinR + cropNaturalH * cosR));
      if (cropTemp.scale < minS) { cropTemp.scale = minS; if (parseFloat(cropZoom.min) > minS) cropZoom.min = minS.toFixed(4); cropZoom.value = minS; }
      const s = cropTemp.scale, sw = cropNaturalW * s, sh = cropNaturalH * s;
      const halfW = (sw * cosR + sh * sinR) / 2, halfH = (sw * sinR + sh * cosR) / 2;
      cropTemp.x = Math.min(halfW - cropNaturalW / 2, Math.max(frameW - halfW - cropNaturalW / 2, cropTemp.x));
      cropTemp.y = Math.min(halfH - cropNaturalH / 2, Math.max(frameH - halfH - cropNaturalH / 2, cropTemp.y));
    }
    function updateCropTransform() {
      const ns = parseFloat(cropZoom.value), os = cropTemp.scale, nr = parseInt(cropRotate.value, 10) || 0;
      if (os !== ns) {
        const cx = frameW / 2, cy = frameH / 2, imgCx = cropTemp.x + cropNaturalW / 2, imgCy = cropTemp.y + cropNaturalH / 2;
        cropTemp.x += (cx - imgCx) * (1 - ns / os); cropTemp.y += (cy - imgCy) * (1 - ns / os); cropTemp.scale = ns;
      }
      cropTemp.rotate = nr; clampCropPosition(); zoomLabel.innerText = (cropTemp.scale / (photoState.scale || 1)).toFixed(1) + "X"; rotateLabel.innerText = cropTemp.rotate + "°"; renderCropPreview();
    }
    function applyCrop() { Object.assign(photoState, { x: cropTemp.x, y: cropTemp.y, scale: cropTemp.scale, rotate: cropTemp.rotate }); applyImageState(); closeCropModal(); }
    function onStart(e) { if (e.target.id !== "cropPreviewImg") return; const t = e.touches ? e.touches[0] : e; cropTemp.isDragging = true; cropTemp.lastX = t.clientX; cropTemp.lastY = t.clientY; }
    function onMove(e) { if (!cropTemp.isDragging) return; const t = e.touches ? e.touches[0] : e; cropTemp.x += (t.clientX - cropTemp.lastX) / viewScale; cropTemp.y += (t.clientY - cropTemp.lastY) / viewScale; cropTemp.lastX = t.clientX; cropTemp.lastY = t.clientY; renderCropPreview(); e.preventDefault(); }
    function onEnd() { if (!cropTemp.isDragging) return; cropTemp.isDragging = false; clampCropPosition(); renderCropPreview(); }

    async function ensureFontsReady() {
      if (!document.fonts) return;
      await Promise.allSettled(FONT_OPTIONS.map(f => document.fonts.load(`16px ${f.value}`)));
      await document.fonts.ready;
      await new Promise(r => setTimeout(r, 30));
    }
    async function exportPhoto() {
      const exportLoading = document.getElementById("exportLoading");
      exportLoading.style.display = "flex";
      
      try {
        await ensureFontsReady();
        
        const area = document.getElementById("captureArea");
        const w = area.offsetWidth;
        const h = area.offsetHeight;
        const qualityScale = parseFloat(document.getElementById("exportQuality").value);

        // 关键：截图前回到页面顶部，避免滚动偏移
        window.scrollTo(0, 0);

        const canvas = await html2canvas(area, {
          scale: qualityScale,
          useCORS: true,
          backgroundColor: "#ffffff",
          logging: false,
          // 锁定宽高，骗过移动端的 DPR 和视口限制
          width: w, 
          height: h, 
          windowWidth: w, 
          windowHeight: h, 
          x: 0, 
          y: 0, 
          scrollX: 0, 
          scrollY: 0,
          onclone: (clonedDoc) => {
            // 1. 在克隆文档中取消缩放，恢复 1:1，绝对不要改真实 DOM
            const clonedScaler = clonedDoc.getElementById("scaler");
            if (clonedScaler) {
              clonedScaler.style.transform = "none";
              clonedScaler.style.margin = "0";
              clonedScaler.style.padding = "0";
            }

            // 2. 去掉被选中的蓝色边框
            clonedDoc.querySelectorAll(".polaroid.active").forEach(el => { 
              el.classList.remove("active"); 
              el.style.boxShadow = "none"; 
              el.style.border = "none";
            });

            // 3. 再次确保文字不会被切断
            clonedDoc.querySelectorAll(".caption-line").forEach(el => {
              el.style.overflow = "visible";
              el.style.lineHeight = "1.35";
            });
          }
        });

        const link = document.createElement("a");
        link.download = `Polaroid_Vertical_${Date.now()}.jpg`;
        link.href = canvas.toDataURL("image/jpeg", 0.95);
        link.click();
      } catch (e) {
        console.error("Export Error:", e);
        alert("导出失败，请重试或在电脑端打开");
      } finally {
        exportLoading.style.display = "none";
      }
    }

    window.addEventListener("resize", () => { autoScaleCanvas(); if (cropModal.style.display === "flex") { recalcCropViewScale(); renderCropPreview(); } });
    window.addEventListener("load", () => { renderFontMenus(); updateCardGeometry(marginVValue); updateCardLayout(); updateCanvasSize(); syncControls(); renderCaption(); autoScaleCanvas(); });
    document.addEventListener("click", closeFontMenus);
    document.addEventListener("mousedown", onStart); document.addEventListener("mousemove", onMove); document.addEventListener("mouseup", onEnd);
    document.addEventListener("touchstart", onStart, { passive: false }); document.addEventListener("touchmove", onMove, { passive: false }); document.addEventListener("touchend", onEnd);
  </script>
</body>
</html>
