<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>6寸常规拼图（两张照片）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --canvas-w: 600px;
            --canvas-h: 900px;
            --slot-w: 600px;
            --slot-h: 450px;
        }

        body {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }

        .canvas-viewport {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
            background: #f8fafc;
            min-height: calc(100vh - 160px);
        }

        .canvas-scaler {
            transform-origin: top center;
            transition: transform 0.2s ease;
        }

        .photo-canvas {
            width: var(--canvas-w);
            height: var(--canvas-h);
            background: #fff;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            border: none;
        }

        .photo-slot {
            position: absolute;
            width: var(--slot-w);
            height: var(--slot-h);
            background: #fcfcfc;
            overflow: hidden;
            cursor: pointer;
            z-index: 10;
        }

        .photo-slot:active { background: #f1f5f9; }

        .photo-slot.active {
            box-shadow: inset 0 0 0 6px #3b82f6;
            z-index: 20;
        }

        .photo-slot img {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: center center;
            pointer-events: none;
            max-width: none !important;
            max-height: none !important;
            display: none;
        }

        .slot-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            pointer-events: none;
            border: 1px dashed #e2e8f0;
        }

        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        .crop-modal {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: none;
            flex-direction: column;
        }

        #cropWrapper {
            position: relative;
            transform-origin: center center;
            background: #111;
            overflow: hidden;
            flex-shrink: 0; /* 防止 Flexbox 挤压 */
        }

        #cropBox {
            position: absolute;
            inset: 0;
            border: 2px solid #3b82f6;
            box-shadow: 0 0 0 5000px rgba(0, 0, 0, 0.8);
            z-index: 20;
            pointer-events: none;
        }

        #cropPreviewImg {
            position: absolute;
            top: 0;
            left: 0;
            cursor: move;
            touch-action: none;
            transform-origin: center center;
            max-width: none !important;
            max-height: none !important;
        }

        #exportLoading {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            margin-top: -9px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-40 px-4 py-3 flex justify-between items-center border-b border-slate-200">
        <div class="flex flex-col">
            <h1 class="text-sm font-bold text-slate-800">4x6 竖版双拼</h1>
            <div class="flex items-center gap-2">
                <select id="exportQuality" class="text-[10px] bg-slate-100 border-none rounded px-1 font-bold text-blue-600 focus:ring-0">
                    <option value="1">预览 (600x900)</option>
                    <option value="2">高清 (300DPI)</option>
                    <option value="3" selected>超清 (450DPI)</option>
                </select>
            </div>
        </div>
        <button onclick="openMarginModal()" class="bg-gray-200 text-gray-700 px-4 py-1.5 rounded-full text-xs font-bold shadow-md active:scale-95 transition mr-2">边距</button>
        <button onclick="exportPhoto()" class="bg-blue-600 text-white px-4 py-1.5 rounded-full text-xs font-bold shadow-md active:scale-95 transition">导出</button>
    </header>

    <main class="flex-1 canvas-viewport" onclick="deselectAll(event)">
        <div id="scaler" class="canvas-scaler">
            <div id="capture-area" class="photo-canvas">
                <div class="photo-slot" style="top: 0; left: 0;" data-id="p1" onclick="selectSlot(this, event)">
                    <div class="slot-placeholder">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
                        <span class="text-[10px] mt-1 uppercase font-bold tracking-tighter">添加照片</span>
                    </div>
                    <img src="" alt="">
                </div>
                <div class="photo-slot" style="top: 450px; left: 0;" data-id="p2" onclick="selectSlot(this, event)">
                    <div class="slot-placeholder">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
                        <span class="text-[10px] mt-1 uppercase font-bold tracking-tighter">添加照片</span>
                    </div>
                    <img src="" alt="">
                </div>
            </div>
        </div>
    </main>

    <div id="toolbar" class="fixed bottom-0 left-0 right-0 bg-white shadow-[0_-10px_40px_rgba(0,0,0,0.05)] translate-y-full transition-transform duration-300 z-50 border-t border-slate-100 safe-bottom">
        <div class="flex justify-around p-4">
            <button onclick="triggerUpload()" class="flex flex-col items-center gap-1 group">
                <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center group-active:scale-90 transition">
                    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                </div>
                <span class="text-[11px] font-bold text-slate-500">更换照片</span>
            </button>
            <button id="btnCrop" onclick="openCropModal()" class="flex flex-col items-center gap-1 group">
                <div class="w-12 h-12 bg-slate-50 text-slate-600 rounded-2xl flex items-center justify-center group-active:scale-90 transition">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 3v15M18 6v15M3 6h15M6 18h15"/></svg>
                </div>
                <span class="text-[11px] font-bold text-slate-500">缩放旋转</span>
            </button>
            <button onclick="clearSlot()" class="flex flex-col items-center gap-1 group">
                <div class="w-12 h-12 bg-red-50 text-red-500 rounded-2xl flex items-center justify-center group-active:scale-90 transition">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                </div>
                <span class="text-[11px] font-bold text-slate-500">移除</span>
            </button>
        </div>
    </div>

    <div id="cropModal" class="crop-modal">
        <div class="p-4 flex justify-between items-center bg-black/80 backdrop-blur safe-top">
            <button onclick="closeCropModal()" class="text-white/40 text-sm px-2">取消</button>
            <span class="text-white text-xs font-bold tracking-widest uppercase">编辑照片</span>
            <button onclick="applyCrop()" class="bg-blue-600 text-white px-5 py-2 rounded-full text-xs font-bold">保存</button>
        </div>
        <div class="flex-1 flex items-center justify-center overflow-hidden p-4" id="cropViewport">
            <div id="cropWrapper">
                <img id="cropPreviewImg" src="" draggable="false">
                <div id="cropBox"></div>
            </div>
        </div>
        <div class="p-8 bg-zinc-950 safe-bottom">
            <div class="max-w-xs mx-auto space-y-8">
                <div>
                    <div class="flex justify-between text-[10px] text-zinc-500 font-black mb-3"><span>缩放</span><span id="zoomLabel" class="text-blue-500">1.0X</span></div>
                    <input type="range" id="cropZoom" min="0.1" max="3" step="0.01" oninput="updateCropTransform()" class="w-full">
                </div>
                <div>
                    <div class="flex justify-between text-[10px] text-zinc-500 font-black mb-3"><span>旋转</span><span id="rotateLabel" class="text-blue-500">0°</span></div>
                    <input type="range" id="cropRotate" min="-180" max="180" step="1" oninput="updateCropTransform()" class="w-full">
                </div>
            </div>
        </div>
    </div>

    <div id="marginModal" class="crop-modal">
        <div class="p-4 flex justify-between items-center bg-black/80 backdrop-blur safe-top">
            <button onclick="closeMarginModal()" class="text-white/40 text-sm px-2">取消</button>
            <span class="text-white text-xs font-bold tracking-widest uppercase">设置边距</span>
            <button onclick="applyMargin()" class="bg-blue-600 text-white px-5 py-2 rounded-full text-xs font-bold">保存</button>
        </div>
        <div class="p-8 bg-zinc-950 safe-bottom">
            <div class="max-w-xs mx-auto space-y-8">
                <div>
                    <div class="flex justify-between text-[10px] text-zinc-500 font-black mb-3"><span>水平边距 (px)</span><span id="marginHLabel" class="text-blue-500">0</span></div>
                    <input type="range" id="marginH" min="0" max="200" step="1" oninput="updateMarginPreview()" class="w-full">
                </div>
                <div>
                    <div class="flex justify-between text-[10px] text-zinc-500 font-black mb-3"><span>垂直边距 (px)</span><span id="marginVLabel" class="text-blue-500">0</span></div>
                    <input type="range" id="marginV" min="0" max="200" step="1" oninput="updateMarginPreview()" class="w-full">
                </div>
            </div>
        </div>
    </div>

    <div id="exportLoading">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-blue-500 border-t-transparent mb-4"></div>
        <p class="text-sm font-medium">正在生成高清图片...</p>
        <p class="text-[10px] text-zinc-400 mt-2">正在按照高像素标准导出</p>
    </div>

    <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleFile(event)">

    <script>
        let activeSlot = null;
        const photoStates = new Map();
        let cropNaturalW = 0;
        let cropNaturalH = 0;
        let cropTemp = { x: 0, y: 0, scale: 1, rotate: 0, lastX: 0, lastY: 0, isDragging: false };
        let viewScale = 1;
        let marginH = 0;
        let marginV = 0;

        const SLOT_W = 600;
        const SLOT_H = 450;

        function updateSlotPositions() {
            const p1 = document.querySelector('[data-id="p1"]');
            const p2 = document.querySelector('[data-id="p2"]');
            if (!p1 || !p2) return;

            p1.style.left = `${marginH}px`;
            p1.style.top = `${marginV}px`;
            p2.style.left = `${marginH}px`;
            p2.style.top = `${marginV + SLOT_H + marginV}px`;
            updateCanvasSize();
        }

        function updateCanvasSize() {
            const root = document.documentElement;
            const newW = SLOT_W + marginH * 2;
            const newH = SLOT_H * 2 + marginV * 3;
            root.style.setProperty('--canvas-w', `${newW}px`);
            root.style.setProperty('--canvas-h', `${newH}px`);
            autoScaleCanvas();
        }

        function recalcCropViewScale() {
            const viewport = document.getElementById('cropViewport');
            const wrapper = document.getElementById('cropWrapper');
            const rect = viewport.getBoundingClientRect();
            let viewportW = rect.width - 24;
            let viewportH = rect.height - 24;

            if (viewportW < 200 || viewportH < 160) {
                viewportW = window.innerWidth * 0.92;
                viewportH = window.innerHeight * 0.56;
            }

            viewScale = Math.min(viewportW / SLOT_W, viewportH / SLOT_H, 1);
            
            // 修复1：直接设定尺寸，通过 CSS Transform 缩放 Wrapper
            // 这样内部的 img 就不需要再乘以视口系数了，坐标系原汁原味
            wrapper.style.width = `${SLOT_W}px`;
            wrapper.style.height = `${SLOT_H}px`;
            wrapper.style.transform = `scale(${viewScale})`;
        }

        function renderCropPreview() {
            const preview = document.getElementById('cropPreviewImg');
            // 修复1：不再使用 viewScale 污染坐标
            preview.style.transform = `translate(${cropTemp.x}px, ${cropTemp.y}px) rotate(${cropTemp.rotate}deg) scale(${cropTemp.scale})`;
        }

        function autoScaleCanvas() {
            const container = document.querySelector('.canvas-viewport');
            const scaler = document.getElementById('scaler');
            const cw = container.clientWidth - 40;
            const captureArea = document.getElementById('capture-area');
            const baseW = captureArea ? captureArea.offsetWidth : SLOT_W;
            const scale = Math.min(cw / baseW, 1);
            scaler.style.transform = `scale(${scale})`;
        }

        window.addEventListener('resize', autoScaleCanvas);
        window.addEventListener('load', () => {
            updateSlotPositions();
            autoScaleCanvas();
        });

        function selectSlot(slot, e) {
            if (e) e.stopPropagation();
            if (activeSlot) activeSlot.classList.remove('active');
            activeSlot = slot;
            activeSlot.classList.add('active');

            const hasImg = photoStates.has(activeSlot.dataset.id);
            document.getElementById('btnCrop').style.opacity = hasImg ? '1' : '0.3';
            document.getElementById('btnCrop').style.pointerEvents = hasImg ? 'auto' : 'none';
            document.getElementById('toolbar').style.transform = 'translateY(0)';
        }

        function deselectAll(e) {
            if (e.target.id === 'capture-area' || e.target.classList.contains('canvas-viewport')) {
                if (activeSlot) activeSlot.classList.remove('active');
                activeSlot = null;
                document.getElementById('toolbar').style.transform = 'translateY(100%)';
            }
        }

        function triggerUpload() {
            document.getElementById('fileInput').value = '';
            document.getElementById('fileInput').click();
        }

        function clearSlot() {
            if (!activeSlot) return;
            const id = activeSlot.dataset.id;
            const img = activeSlot.querySelector('img');
            const placeholder = activeSlot.querySelector('.slot-placeholder');
            img.src = '';
            img.style.display = 'none';
            placeholder.style.display = 'flex';
            photoStates.delete(id);
            deselectAll({ target: document.querySelector('.canvas-viewport') });
        }

        function handleFile(event) {
            const file = event.target.files[0];
            if (!file || !activeSlot) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = activeSlot.querySelector('img');
                const placeholder = activeSlot.querySelector('.slot-placeholder');
                img.src = e.target.result;
                img.style.display = 'block';
                placeholder.style.display = 'none';
                img.onload = () => {
                    const fitScale = Math.max(SLOT_W / img.naturalWidth, SLOT_H / img.naturalHeight);
                    const state = {
                        x: (SLOT_W - img.naturalWidth) / 2,
                        y: (SLOT_H - img.naturalHeight) / 2,
                        scale: fitScale,
                        rotate: 0
                    };
                    photoStates.set(activeSlot.dataset.id, state);
                    img.style.transform = `translate(${state.x}px, ${state.y}px) rotate(${state.rotate}deg) scale(${state.scale})`;
                    document.getElementById('btnCrop').style.opacity = '1';
                    document.getElementById('btnCrop').style.pointerEvents = 'auto';
                };
            };
            reader.readAsDataURL(file);
        }

        function openCropModal() {
            if (!activeSlot) return;
            const img = activeSlot.querySelector('img');
            if (!photoStates.has(activeSlot.dataset.id)) return triggerUpload();
            const state = photoStates.get(activeSlot.dataset.id);
            const modal = document.getElementById('cropModal');
            const preview = document.getElementById('cropPreviewImg');

            cropNaturalW = img.naturalWidth;
            cropNaturalH = img.naturalHeight;

            modal.style.display = 'flex';
            preview.src = img.src;
            cropTemp = { ...state, isDragging: false };
            const zoomSlider = document.getElementById('cropZoom');
            zoomSlider.min = (cropTemp.scale * 0.1).toFixed(4);
            zoomSlider.max = (cropTemp.scale * 10).toFixed(4);
            zoomSlider.value = cropTemp.scale;
            document.getElementById('cropRotate').value = cropTemp.rotate || 0;
            requestAnimationFrame(() => {
                recalcCropViewScale();
                updateCropTransform();
            });
        }

        function openMarginModal() {
            const modal = document.getElementById('marginModal');
            document.getElementById('marginH').value = marginH;
            document.getElementById('marginV').value = marginV;
            document.getElementById('marginHLabel').innerText = marginH;
            document.getElementById('marginVLabel').innerText = marginV;
            modal.style.display = 'flex';
        }

        function closeMarginModal() {
            document.getElementById('marginModal').style.display = 'none';
        }

        function updateMarginPreview() {
            const h = parseInt(document.getElementById('marginH').value, 10) || 0;
            const v = parseInt(document.getElementById('marginV').value, 10) || 0;
            document.getElementById('marginHLabel').innerText = h;
            document.getElementById('marginVLabel').innerText = v;
        }

        function applyMargin() {
            marginH = parseInt(document.getElementById('marginH').value, 10) || 0;
            marginV = parseInt(document.getElementById('marginV').value, 10) || 0;
            updateSlotPositions();
            closeMarginModal();
        }

        function updateCropTransform() {
            const newScale = parseFloat(document.getElementById('cropZoom').value);
            const oldScale = cropTemp.scale;
            const newRotate = parseInt(document.getElementById('cropRotate').value, 10) || 0;
            const imgRef = activeSlot.querySelector('img');
            if (oldScale !== newScale && imgRef) {
                const cx = SLOT_W / 2;
                const cy = SLOT_H / 2;
                const imgCx = cropTemp.x + imgRef.naturalWidth / 2;
                const imgCy = cropTemp.y + imgRef.naturalHeight / 2;
                const vx = cx - imgCx;
                const vy = cy - imgCy;
                cropTemp.x += vx * (1 - newScale / oldScale);
                cropTemp.y += vy * (1 - newScale / oldScale);
                cropTemp.scale = newScale;
            }
            cropTemp.rotate = newRotate;

            clampCropPosition();

            const baseScale = photoStates.get(activeSlot.dataset.id)?.scale || 1;
            document.getElementById('zoomLabel').innerText = (cropTemp.scale / baseScale).toFixed(1) + 'X';
            document.getElementById('rotateLabel').innerText = cropTemp.rotate + '°';
            renderCropPreview();
        }

        function applyCrop() {
            const state = { ...cropTemp };
            photoStates.set(activeSlot.dataset.id, state);
            const img = activeSlot.querySelector('img');
            img.style.transform = `translate(${state.x}px, ${state.y}px) rotate(${state.rotate}deg) scale(${state.scale})`;
            closeCropModal();
        }

        function closeCropModal() {
            document.getElementById('cropModal').style.display = 'none';
        }

        window.addEventListener('resize', () => {
            const modal = document.getElementById('cropModal');
            if (modal.style.display === 'flex') {
                recalcCropViewScale();
                renderCropPreview();
            }
        });

        function onStart(e) {
            if (e.target.id === 'cropPreviewImg') {
                const t = e.touches ? e.touches[0] : e;
                cropTemp.isDragging = true;
                cropTemp.lastX = t.clientX;
                cropTemp.lastY = t.clientY;
            }
        }

        function onMove(e) {
            if (cropTemp.isDragging) {
                const t = e.touches ? e.touches[0] : e;
                cropTemp.x += (t.clientX - cropTemp.lastX) / viewScale;
                cropTemp.y += (t.clientY - cropTemp.lastY) / viewScale;
                cropTemp.lastX = t.clientX;
                cropTemp.lastY = t.clientY;
                renderCropPreview();
                e.preventDefault();
            }
        }

        function onEnd() {
            if (cropTemp.isDragging) {
                cropTemp.isDragging = false;
                clampCropPosition();
                const preview = document.getElementById('cropPreviewImg');
                preview.style.transition = 'transform 0.25s ease';
                renderCropPreview();
                setTimeout(() => {
                    preview.style.transition = '';
                }, 300);
            }
        }

        document.addEventListener('mousedown', onStart);
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onEnd);
        document.addEventListener('touchstart', onStart, { passive: false });
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend', onEnd);

        function clampCropPosition() {
            if (!cropNaturalW || !activeSlot) return;
            const imgW = cropNaturalW;
            const imgH = cropNaturalH;
            const cropW = SLOT_W;
            const cropH = SLOT_H;

            const r = cropTemp.rotate * Math.PI / 180;
            const cosR = Math.abs(Math.cos(r));
            const sinR = Math.abs(Math.sin(r));

            const minScale = Math.max(
                cropW / (imgW * cosR + imgH * sinR),
                cropH / (imgW * sinR + imgH * cosR)
            );

            if (cropTemp.scale < minScale) {
                cropTemp.scale = minScale;
                const slider = document.getElementById('cropZoom');
                if (parseFloat(slider.min) > minScale) slider.min = minScale.toFixed(4);
                slider.value = minScale;
                document.getElementById('zoomLabel').innerText = (cropTemp.scale / (photoStates.get(activeSlot.dataset.id)?.scale || 1)).toFixed(1) + 'X';
            }

            const s = cropTemp.scale;
            const sw = imgW * s;
            const sh = imgH * s;
            const halfW = (sw * cosR + sh * sinR) / 2;
            const halfH = (sw * sinR + sh * cosR) / 2;

            // 修复2：重写平移边界（Clamp）计算公式，加入图片的原始尺寸偏移
            const xMin = cropW - halfW - imgW / 2;
            const xMax = halfW - imgW / 2;
            const yMin = cropH - halfH - imgH / 2;
            const yMax = halfH - imgH / 2;

            cropTemp.x = Math.min(xMax, Math.max(xMin, cropTemp.x));
            cropTemp.y = Math.min(yMax, Math.max(yMin, cropTemp.y));
        }

        async function exportPhoto() {
            const area = document.getElementById('capture-area');
            const loading = document.getElementById('exportLoading');
            const qualityScale = parseFloat(document.getElementById('exportQuality').value);

            loading.style.display = 'flex';
            const prevActive = activeSlot;
            if (activeSlot) activeSlot.classList.remove('active');

            setTimeout(async () => {
                try {
                    const scaler = document.getElementById('scaler');
                    const originalTransform = scaler.style.transform;
                    scaler.style.transform = 'scale(1)';

                    const canvas = await html2canvas(area, {
                        scale: qualityScale,
                        useCORS: true,
                        logging: false,
                        backgroundColor: '#ffffff'
                    });

                    scaler.style.transform = originalTransform;

                    const link = document.createElement('a');
                    const timestamp = new Date().getTime();
                    link.download = `Photo_4x6_vertical_2up_${timestamp}.jpg`;
                    link.href = canvas.toDataURL('image/jpeg', 0.95);
                    link.click();
                } catch (err) {
                    console.error(err);
                    alert('生成失败，请尝试降低导出画质');
                } finally {
                    if (prevActive) prevActive.classList.add('active');
                    loading.style.display = 'none';
                }
            }, 100);
        }
    </script>
</body>
</html>
