<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>6x4 横版精修排版工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --canvas-w: 900px;
            --canvas-h: 600px;
            --sub-w: 160px;
            --sub-h: 120px;
        }

        body { 
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }

        /* 视口与缩放器 */
        .canvas-viewport {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center; /* 垂直居中 */
            padding: 20px 10px;
            background: #f8fafc;
            min-height: calc(100vh - 160px);
            overflow: hidden;
        }

        .canvas-scaler {
            transform-origin: center center; /* 横版中心缩放视觉更好 */
            transition: transform 0.2s ease;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .photo-canvas {
            width: var(--canvas-w);
            height: var(--canvas-h);
            background: #fff;
            position: relative;
            overflow: hidden;
        }

        /* 背景大图 Slot */
        .main-slot {
            position: absolute; inset: 0;
            background: #f1f5f9;
            overflow: hidden;
            cursor: pointer;
            z-index: 1;
        }
        
        .main-slot .placeholder {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #cbd5e1; pointer-events: none;
        }

        /* 小相框 Slot */
        .sub-slot-frame {
            position: absolute;
            background: #fff;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            z-index: 10;
            cursor: move;
            padding: 3px;
            transition: box-shadow 0.2s;
            touch-action: none;
        }

        .sub-slot-frame.active {
            box-shadow: 0 0 0 2px #3b82f6, 0 15px 35px rgba(0,0,0,0.25);
            z-index: 100 !important;
        }

        .sub-image-container {
            width: var(--sub-w);
            height: var(--sub-h);
            background: #e2e8f0;
            overflow: hidden;
            position: relative;
        }

        /* 通用图片样式 */
        img.canvas-img {
            position: absolute;
            top: 0; left: 0;
            transform-origin: center center;
            pointer-events: none;
            display: none;
            max-width: none !important;
            max-height: none !important;
        }

        /* 裁剪弹窗 */
        .crop-modal {
            position: fixed; inset: 0;
            background: #000; z-index: 1000;
            display: none; flex-direction: column;
        }
        
        #cropWrapper {
            position: relative;
            transform-origin: center center;
            background: #111;
        }

        #cropBox {
            position: absolute; inset: 0;
            border: 1px solid #3b82f6;
            box-shadow: 0 0 0 5000px rgba(0,0,0,0.8);
            z-index: 20; pointer-events: none;
        }

        #cropPreviewImg {
            position: absolute; top: 0; left: 0;
            cursor: move; touch-action: none;
            transform-origin: center center;
            max-width: none !important;
            max-height: none !important;
        }

        /* Loading */
        #exportLoading {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            flex-direction: column;
            align-items: center; justify-content: center;
            color: white;
            backdrop-filter: blur(5px);
        }

        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 20px); }
        
        /* Range Input Style */
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #333; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #3b82f6; margin-top: -8px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <!-- 顶部导航 -->
    <header class="bg-white/90 backdrop-blur sticky top-0 z-40 px-4 py-3 flex justify-between items-center border-b border-slate-200 shadow-sm">
        <div>
            <h1 class="text-sm font-bold text-slate-800">6x4 横版六联</h1>
            <div class="flex items-center gap-2 mt-0.5">
                <span class="text-[10px] text-slate-400">底图 6:4 | 小图 160x120</span>
                <select id="exportQuality" class="text-[10px] bg-slate-100 border-none rounded px-1 py-0.5 font-bold text-blue-600 focus:ring-0">
                    <option value="1">预览 (900x600)</option>
                    <option value="2" selected>高清 (1800x1200 / 300DPI)</option>
                    <option value="3">超清 (2700x1800 / 450DPI)</option>
                </select>
            </div>
        </div>
        <button onclick="exportPhoto()" class="bg-blue-600 text-white px-4 py-1.5 rounded-full text-xs font-bold shadow-md active:scale-95 transition">导出</button>
    </header>

    <!-- 主画布区域 -->
    <main class="flex-1 canvas-viewport" onclick="deselectAll(event)">
        <div id="scaler" class="canvas-scaler">
            <div id="capture-area" class="photo-canvas">
                
                <!-- 背景大图 -->
                <div class="main-slot" data-id="main" onclick="selectSlot(this, event)">
                    <div class="placeholder">
                        <svg class="w-16 h-16 mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <span class="text-sm font-bold uppercase tracking-widest">点击上传横版背景</span>
                    </div>
                    <img class="canvas-img" src="" alt="">
                </div>

                <!-- 5个小相框 (保留原版位置参数) -->
                <div class="sub-slot-frame" style="top: 430px; left: 15px; transform: rotate(-3deg);" data-id="sub1" onmousedown="startFrameDrag(this, event)" ontouchstart="startFrameDrag(this, event)">
                    <div class="sub-image-container"><img class="canvas-img" src="" alt=""></div>
                </div>
                <div class="sub-slot-frame" style="top: 450px; left: 190px; transform: rotate(2deg);" data-id="sub2" onmousedown="startFrameDrag(this, event)" ontouchstart="startFrameDrag(this, event)">
                    <div class="sub-image-container"><img class="canvas-img" src="" alt=""></div>
                </div>
                <div class="sub-slot-frame" style="top: 440px; left: 365px; transform: rotate(-1deg);" data-id="sub3" onmousedown="startFrameDrag(this, event)" ontouchstart="startFrameDrag(this, event)">
                    <div class="sub-image-container"><img class="canvas-img" src="" alt=""></div>
                </div>
                <div class="sub-slot-frame" style="top: 455px; left: 540px; transform: rotate(3deg);" data-id="sub4" onmousedown="startFrameDrag(this, event)" ontouchstart="startFrameDrag(this, event)">
                    <div class="sub-image-container"><img class="canvas-img" src="" alt=""></div>
                </div>
                <div class="sub-slot-frame" style="top: 435px; left: 715px; transform: rotate(-2deg);" data-id="sub5" onmousedown="startFrameDrag(this, event)" ontouchstart="startFrameDrag(this, event)">
                    <div class="sub-image-container"><img class="canvas-img" src="" alt=""></div>
                </div>

            </div>
        </div>
    </main>

    <!-- 底部工具栏 -->
    <div id="toolbar" class="fixed bottom-0 left-0 right-0 bg-white shadow-[0_-10px_40px_rgba(0,0,0,0.05)] translate-y-full transition-transform duration-300 z-50 border-t border-slate-100 safe-bottom">
        <div class="flex justify-around p-4 items-center">
            <button onclick="triggerUpload()" class="flex flex-col items-center gap-1 group w-14">
                <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center group-active:scale-90 transition">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                </div>
                <span class="text-[10px] font-bold text-slate-500">换图</span>
            </button>
            
            <button id="btnCrop" onclick="openCropModal()" class="flex flex-col items-center gap-1 group w-14 opacity-50 pointer-events-none transition-opacity">
                <div class="w-10 h-10 bg-slate-50 text-slate-600 rounded-xl flex items-center justify-center group-active:scale-90 transition">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 3v15M18 6v15M3 6h15M6 18h15"/></svg>
                </div>
                <span class="text-[10px] font-bold text-slate-500">裁剪</span>
            </button>

            <!-- 仅小相框显示的旋转按钮 -->
            <button id="btnRotateFrame" onclick="rotateActiveFrame()" class="flex flex-col items-center gap-1 group w-14 hidden">
                <div class="w-10 h-10 bg-purple-50 text-purple-600 rounded-xl flex items-center justify-center group-active:scale-90 transition">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                </div>
                <span class="text-[10px] font-bold text-slate-500">转框</span>
            </button>

            <button onclick="clearSlot()" class="flex flex-col items-center gap-1 group w-14">
                <div class="w-10 h-10 bg-red-50 text-red-500 rounded-xl flex items-center justify-center group-active:scale-90 transition">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                </div>
                <span class="text-[10px] font-bold text-slate-500">移除</span>
            </button>
        </div>
    </div>

    <!-- 裁剪弹窗 -->
    <div id="cropModal" class="crop-modal">
        <div class="p-4 flex justify-between items-center bg-black/80 backdrop-blur safe-top">
            <button onclick="closeCropModal()" class="text-white/40 text-sm px-2">取消</button>
            <span class="text-white text-xs font-bold tracking-widest uppercase">编辑照片</span>
            <button onclick="applyCrop()" class="bg-blue-600 text-white px-5 py-2 rounded-full text-xs font-bold">保存</button>
        </div>
        <div class="flex-1 flex items-center justify-center overflow-hidden p-4" id="cropViewport">
            <div id="cropWrapper">
                <img id="cropPreviewImg" src="" draggable="false">
                <div id="cropBox"></div>
            </div>
        </div>
        <div class="p-8 bg-zinc-950 safe-bottom">
            <div class="max-w-xs mx-auto space-y-6">
                <div>
                    <div class="flex justify-between text-[10px] text-zinc-500 font-black mb-2"><span>缩放</span><span id="zoomLabel" class="text-blue-500">1.0X</span></div>
                    <input type="range" id="cropZoom" min="0.1" max="3" step="0.01" oninput="updateCropTransform()">
                </div>
                <div>
                    <div class="flex justify-between text-[10px] text-zinc-500 font-black mb-2"><span>旋转</span><span id="rotateLabel" class="text-blue-500">0°</span></div>
                    <input type="range" id="cropRotate" min="-180" max="180" step="1" oninput="updateCropTransform()">
                </div>
            </div>
        </div>
    </div>

    <!-- 导出 Loading -->
    <div id="exportLoading">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-blue-500 border-t-transparent mb-4"></div>
        <p class="text-sm font-medium">正在生成高清图片...</p>
        <p class="text-[10px] text-zinc-400 mt-2">横版高精度渲染中</p>
    </div>

    <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleFile(event)">

    <script>
        let activeSlot = null;
        const photoStates = new Map();
        
        let cropTemp = { x: 0, y: 0, scale: 1, rotate: 0, lastX: 0, lastY: 0, isDragging: false };
        let viewScale = 1;
        
        // 相框拖拽状态
        let frameDragState = { isDragging: false, startX: 0, startY: 0, initialLeft: 0, initialTop: 0 };

        const LOGIC_W = { main: 900, sub: 160 };
        const LOGIC_H = { main: 600, sub: 120 };

        // 自动缩放画布 (适配横版 900px)
        function autoScaleCanvas() {
            const container = document.querySelector('.canvas-viewport');
            const scaler = document.getElementById('scaler');
            const cw = container.clientWidth - 20; 
            // 如果屏幕比 900px 小，就缩放；否则最大为 1.0 (防止电脑端过大)
            const scale = Math.min(cw / 900, 1);
            scaler.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', autoScaleCanvas);
        window.addEventListener('load', autoScaleCanvas);

        function selectSlot(element, e) {
            if (e) e.stopPropagation();
            if (activeSlot) activeSlot.classList.remove('active');
            
            activeSlot = element;
            activeSlot.classList.add('active');
            
            const id = activeSlot.dataset.id;
            const isMain = id === 'main';
            const hasImg = photoStates.has(id);

            document.getElementById('toolbar').style.transform = "translateY(0)";
            document.getElementById('btnRotateFrame').style.display = isMain ? 'none' : 'flex';
            
            const btnCrop = document.getElementById('btnCrop');
            btnCrop.style.opacity = hasImg ? "1" : "0.5";
            btnCrop.style.pointerEvents = hasImg ? "auto" : "none";
        }

        function deselectAll(e) {
            if (e.target.classList.contains('canvas-viewport') || e.target.id === 'capture-area') {
                if (activeSlot) activeSlot.classList.remove('active');
                activeSlot = null;
                document.getElementById('toolbar').style.transform = "translateY(100%)";
            }
        }

        function triggerUpload() { 
            document.getElementById('fileInput').value = ''; 
            document.getElementById('fileInput').click(); 
        }

        function handleFile(event) {
            const file = event.target.files[0];
            if (!file || !activeSlot) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const id = activeSlot.dataset.id;
                const type = id === 'main' ? 'main' : 'sub';
                
                let img = activeSlot.querySelector('img.canvas-img');
                const placeholder = activeSlot.querySelector('.placeholder');
                
                img.src = e.target.result;
                img.style.display = 'block';
                if(placeholder) placeholder.style.display = 'none';

                img.onload = () => {
                    const w = LOGIC_W[type];
                    const h = LOGIC_H[type];
                    const fitScale = Math.max(w / img.naturalWidth, h / img.naturalHeight);
                    
                    const state = {
                        x: (w - img.naturalWidth) / 2,
                        y: (h - img.naturalHeight) / 2,
                        scale: fitScale,
                        rotate: 0
                    };
                    photoStates.set(id, state);
                    applyImgStyle(img, state);
                    
                    document.getElementById('btnCrop').style.opacity = "1";
                    document.getElementById('btnCrop').style.pointerEvents = "auto";
                };
            };
            reader.readAsDataURL(file);
        }

        function applyImgStyle(img, state) {
            img.style.transform = `translate(${state.x}px, ${state.y}px) rotate(${state.rotate}deg) scale(${state.scale})`;
        }

        function clearSlot() {
            if (!activeSlot) return;
            const id = activeSlot.dataset.id;
            const img = activeSlot.querySelector('img.canvas-img');
            img.src = "";
            img.style.display = "none";
            
            const placeholder = activeSlot.querySelector('.placeholder');
            if(placeholder) placeholder.style.display = "flex";
            
            photoStates.delete(id);
            deselectAll({ target: document.querySelector('.canvas-viewport') });
        }

        function rotateActiveFrame() {
            if (!activeSlot || activeSlot.dataset.id === 'main') return;
            const style = window.getComputedStyle(activeSlot);
            const matrix = new DOMMatrixReadOnly(style.transform);
            let angle = Math.round(Math.atan2(matrix.b, matrix.a) * (180 / Math.PI));
            activeSlot.style.transform = `rotate(${angle + 5}deg)`;
        }

        // Natural dimensions of the image currently being cropped (set in openCropModal)
        let cropNaturalW = 0, cropNaturalH = 0;

        // --- 裁剪逻辑 ---
        function openCropModal() {
            if (!activeSlot) return;
            const id = activeSlot.dataset.id;
            if (!photoStates.has(id)) return triggerUpload();

            const state = photoStates.get(id);
            const img = activeSlot.querySelector('img.canvas-img');
            const type = id === 'main' ? 'main' : 'sub';

            // Store natural size from the already-loaded canvas image
            cropNaturalW = img.naturalWidth;
            cropNaturalH = img.naturalHeight;

            const preview = document.getElementById('cropPreviewImg');
            preview.src = img.src;
            
            const wrapper = document.getElementById('cropWrapper');
            const w = LOGIC_W[type];
            const h = LOGIC_H[type];
            wrapper.style.width = w + 'px';
            wrapper.style.height = h + 'px';

            // 视口适配
            const screenW = window.innerWidth * 0.85;
            const screenH = window.innerHeight * 0.5;
            viewScale = Math.min(screenW / w, screenH / h);
            wrapper.style.transform = `scale(${viewScale})`;
            // Compensate border for wrapper scale so it always appears 1px visually
            document.getElementById('cropBox').style.borderWidth = (1 / viewScale).toFixed(2) + 'px';

            cropTemp = { ...state, isDragging: false };
            
            const zoomSlider = document.getElementById('cropZoom');
            const baseScale = Math.max(w / cropNaturalW, h / cropNaturalH);
            zoomSlider.min = (baseScale * 0.5).toFixed(4);
            zoomSlider.max = (baseScale * 5).toFixed(4);
            zoomSlider.value = cropTemp.scale;
            document.getElementById('cropRotate').value = cropTemp.rotate;

            updateCropTransform();
            document.getElementById('cropModal').style.display = 'flex';
        }

        function updateCropTransform() {
            const newScale = parseFloat(document.getElementById('cropZoom').value);
            const newRotate = parseInt(document.getElementById('cropRotate').value);
            cropTemp.scale = newScale;
            cropTemp.rotate = newRotate;

            clampCropPosition();

            const preview = document.getElementById('cropPreviewImg');
            preview.style.transform = `translate(${cropTemp.x}px, ${cropTemp.y}px) rotate(${cropTemp.rotate}deg) scale(${cropTemp.scale})`;

            document.getElementById('zoomLabel').innerText = newScale.toFixed(2) + 'x';
            document.getElementById('rotateLabel').innerText = newRotate + '°';
        }

        // Clamp photo position so it always fully covers the crop area.
        //
        // CSS transform: translate(x,y) rotate(r) scale(s), transform-origin: center center.
        // The image element is positioned at top:0 left:0 with size imgW x imgH.
        // transform-origin "center center" means the pivot is the image's own center (imgW/2, imgH/2).
        // translate(x,y) shifts the pivot point to (imgW/2 + x, imgH/2 + y) in the container.
        // Then rotate+scale happen around that pivot.
        //
        // So the rendered image center (cx, cy) = (imgW/2 + x, imgH/2 + y).
        // The AABB of the rotated+scaled image around (cx,cy) has half-extents (halfW, halfH).
        //
        // To cover the crop rect [0,cropW] x [0,cropH]:
        //   cx - halfW <= 0   =>  x <= halfW - imgW/2          (left edge at or before 0)
        //   cx + halfW >= cropW => x >= cropW - halfW - imgW/2  (right edge at or after cropW)
        //   cy - halfH <= 0   =>  y <= halfH - imgH/2
        //   cy + halfH >= cropH => y >= cropH - halfH - imgH/2
        function clampCropPosition() {
            if (!cropNaturalW || !activeSlot) return;

            const imgW = cropNaturalW;
            const imgH = cropNaturalH;
            const id = activeSlot.dataset.id;
            const type = id === 'main' ? 'main' : 'sub';
            const cropW = LOGIC_W[type];
            const cropH = LOGIC_H[type];

            const r = cropTemp.rotate * Math.PI / 180;
            const cosR = Math.abs(Math.cos(r));
            const sinR = Math.abs(Math.sin(r));

            // Minimum scale so that the AABB of the rotated image covers the crop rect.
            // AABB width  = imgW*s*cosR + imgH*s*sinR >= cropW  => s >= cropW / (imgW*cosR + imgH*sinR)
            // AABB height = imgW*s*sinR + imgH*s*cosR >= cropH  => s >= cropH / (imgW*sinR + imgH*cosR)
            const minScale = Math.max(
                cropW / (imgW * cosR + imgH * sinR),
                cropH / (imgW * sinR + imgH * cosR)
            );

            // Enforce minimum scale and sync slider
            if (cropTemp.scale < minScale) {
                cropTemp.scale = minScale;
                const slider = document.getElementById('cropZoom');
                if (parseFloat(slider.min) > minScale) slider.min = minScale.toFixed(4);
                slider.value = minScale;
                document.getElementById('zoomLabel').innerText = minScale.toFixed(2) + 'x';
            }

            const s = cropTemp.scale;
            const sw = imgW * s;
            const sh = imgH * s;
            const halfW = (sw * cosR + sh * sinR) / 2;
            const halfH = (sw * sinR + sh * cosR) / 2;

            // x in [cropW - halfW - imgW/2,  halfW - imgW/2]
            const xMin = cropW - halfW - imgW / 2;
            const xMax = halfW - imgW / 2;
            // y in [cropH - halfH - imgH/2,  halfH - imgH/2]
            const yMin = cropH - halfH - imgH / 2;
            const yMax = halfH - imgH / 2;

            cropTemp.x = Math.min(xMax, Math.max(xMin, cropTemp.x));
            cropTemp.y = Math.min(yMax, Math.max(yMin, cropTemp.y));
        }

        function applyCrop() {
            const id = activeSlot.dataset.id;
            const state = { x: cropTemp.x, y: cropTemp.y, scale: cropTemp.scale, rotate: cropTemp.rotate };
            photoStates.set(id, state);
            applyImgStyle(activeSlot.querySelector('img.canvas-img'), state);
            closeCropModal();
        }

        function closeCropModal() { document.getElementById('cropModal').style.display = 'none'; }

        // --- 拖拽事件 ---
        function startFrameDrag(el, e) {
            selectSlot(el, e);
            const point = e.touches ? e.touches[0] : e;
            frameDragState.isDragging = true;
            frameDragState.startX = point.clientX;
            frameDragState.startY = point.clientY;
            frameDragState.initialLeft = el.offsetLeft;
            frameDragState.initialTop = el.offsetTop;
        }

        function startCropDrag(e) {
            const point = e.touches ? e.touches[0] : e;
            cropTemp.isDragging = true;
            cropTemp.lastX = point.clientX;
            cropTemp.lastY = point.clientY;
        }

        function onGlobalMove(e) {
            const point = e.touches ? e.touches[0] : e;

            if (cropTemp.isDragging && document.getElementById('cropModal').style.display === 'flex') {
                e.preventDefault();
                const dx = point.clientX - cropTemp.lastX;
                const dy = point.clientY - cropTemp.lastY;
                cropTemp.x += dx / viewScale;
                cropTemp.y += dy / viewScale;
                cropTemp.lastX = point.clientX;
                cropTemp.lastY = point.clientY;
                const preview = document.getElementById('cropPreviewImg');
                preview.style.transform = `translate(${cropTemp.x}px, ${cropTemp.y}px) rotate(${cropTemp.rotate}deg) scale(${cropTemp.scale})`;
            }
            else if (frameDragState.isDragging && activeSlot && activeSlot.dataset.id !== 'main') {
                e.preventDefault();
                const scaler = document.getElementById('scaler');
                const canvasScale = parseFloat(window.getComputedStyle(scaler).transform.split(',')[3]) || 1;
                const dx = (point.clientX - frameDragState.startX) / canvasScale;
                const dy = (point.clientY - frameDragState.startY) / canvasScale;
                activeSlot.style.left = (frameDragState.initialLeft + dx) + 'px';
                activeSlot.style.top = (frameDragState.initialTop + dy) + 'px';
            }
        }

        function onGlobalEnd() {
            if (cropTemp.isDragging) {
                cropTemp.isDragging = false;
                clampCropPosition();
                // Animate snap-back if position was corrected
                const preview = document.getElementById('cropPreviewImg');
                preview.style.transition = 'transform 0.25s ease';
                preview.style.transform = `translate(${cropTemp.x}px, ${cropTemp.y}px) rotate(${cropTemp.rotate}deg) scale(${cropTemp.scale})`;
                setTimeout(() => { preview.style.transition = ''; }, 300);
            }
            cropTemp.isDragging = false;
            frameDragState.isDragging = false;
        }

        const cropImg = document.getElementById('cropPreviewImg');
        cropImg.addEventListener('mousedown', startCropDrag);
        cropImg.addEventListener('touchstart', startCropDrag, {passive: false});

        document.addEventListener('mousemove', onGlobalMove);
        document.addEventListener('touchmove', onGlobalMove, {passive: false});
        document.addEventListener('mouseup', onGlobalEnd);
        document.addEventListener('touchend', onGlobalEnd);

        async function exportPhoto() {
            const loading = document.getElementById('exportLoading');
            const area = document.getElementById('capture-area');
            const qualityScale = parseFloat(document.getElementById('exportQuality').value);
            
            loading.style.display = 'flex';
            const prevActive = activeSlot;
            if (activeSlot) activeSlot.classList.remove('active');

            setTimeout(async () => {
                try {
                    const scaler = document.getElementById('scaler');
                    const originalTransform = scaler.style.transform;
                    scaler.style.transform = 'scale(1)'; // 还原比例进行截图

                    const canvas = await html2canvas(area, {
                        scale: qualityScale,
                        useCORS: true,
                        logging: false,
                        backgroundColor: '#ffffff'
                    });

                    scaler.style.transform = originalTransform;

                    const link = document.createElement('a');
                    const dpiInfo = qualityScale === 2 ? 'HD' : (qualityScale === 3 ? 'UHD' : 'Preview');
                    link.download = `Photo_6x4_Landscape_${dpiInfo}_${Date.now()}.jpg`;
                    link.href = canvas.toDataURL('image/jpeg', 0.92);
                    link.click();

                } catch (err) {
                    console.error(err);
                    alert("导出失败，请降低画质重试");
                } finally {
                    if (prevActive) prevActive.classList.add('active');
                    loading.style.display = 'none';
                }
            }, 100);
        }
    </script>
</body>
</html>
