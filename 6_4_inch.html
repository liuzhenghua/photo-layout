<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6x4寸照片排版工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .canvas-viewport {
            width: 100%;
            overflow: auto;
            display: flex;
            justify-content: center;
            padding: 40px 0;
            background: #f8fafc;
        }
        .photo-canvas {
            width: 900px;
            height: 600px;
            min-width: 900px;
            min-height: 600px;
            background: #fff;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        .main-slot {
            position: absolute;
            top: 0; left: 0; width: 900px; height: 600px;
            overflow: hidden; background: #f1f5f9;
            cursor: pointer;
        }
        .main-slot.active { outline: 4px solid #3b82f6; z-index: 5; }
        
        .sub-slot-frame {
            position: absolute;
            background: #fff;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            z-index: 10;
            cursor: move;
            padding: 2px;
            transition: outline 0.2s;
        }
        .sub-slot-frame.active { outline: 4px solid #3b82f6; z-index: 50; }

        .sub-image-container {
            width: 160px;
            height: 120px;
            overflow: hidden;
            background: #e2e8f0;
            position: relative;
        }

        /* 强制取消框架的 max-width 限制，确保按 naturalWidth 渲染基准 */
        .slot img {
            position: absolute;
            top: 0; left: 0;
            transform-origin: center center; 
            pointer-events: none;
            display: none;
            will-change: transform;
            max-width: none !important;
            max-height: none !important;
        }

        .slot-label {
            color: #94a3b8; font-size: 14px; pointer-events: none;
            position: absolute; width: 100%; text-align: center;
            top: 50%; transform: translateY(-50%);
        }

        /* 裁剪弹窗样式 */
        .crop-modal {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: none;
            flex-direction: column;
        }
        .crop-viewport {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #cropWrapper {
            position: relative;
            transform-origin: center center;
        }
        #cropBox {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 2px solid #fff;
            box-shadow: 0 0 0 5000px rgba(0,0,0,0.85);
            z-index: 20;
            pointer-events: none; 
        }
        #cropPreviewImg {
            position: absolute;
            top: 0; left: 0;
            transform-origin: center center;
            z-index: 10;
            cursor: move;
            will-change: transform;
            pointer-events: auto;
            max-width: none !important;
            max-height: none !important;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="pt-8 pb-4 text-center">
        <h1 class="text-2xl font-bold text-slate-800">高清照片排版工具</h1>
        <p class="text-slate-500 text-sm">选择下方小照片，可移动、裁剪或旋转相框角度</p>
    </div>

    <div class="canvas-viewport" onclick="deselectAll(event)">
        <div id="capture-area" class="photo-canvas">
            <!-- 主背景槽位 -->
            <div class="main-slot slot" data-id="main" onclick="selectSlot(this, 'main', event)">
                <span class="slot-label">点击上传背景 (900x600)</span>
            </div>

            <!-- 5个小相框 -->
            <div class="sub-slot-frame slot" style="top: 430px; left: 15px; transform: rotate(-3deg);" data-id="sub1" onclick="selectSlot(this, 'sub1', event)">
                <div class="sub-image-container"></div>
            </div>
            <div class="sub-slot-frame slot" style="top: 450px; left: 190px; transform: rotate(2deg);" data-id="sub2" onclick="selectSlot(this, 'sub2', event)">
                <div class="sub-image-container"></div>
            </div>
            <div class="sub-slot-frame slot" style="top: 440px; left: 365px; transform: rotate(-1deg);" data-id="sub3" onclick="selectSlot(this, 'sub3', event)">
                <div class="sub-image-container"></div>
            </div>
            <div class="sub-slot-frame slot" style="top: 455px; left: 540px; transform: rotate(3deg);" data-id="sub4" onclick="selectSlot(this, 'sub4', event)">
                <div class="sub-image-container"></div>
            </div>
            <div class="sub-slot-frame slot" style="top: 435px; left: 715px; transform: rotate(-2deg);" data-id="sub5" onclick="selectSlot(this, 'sub5', event)">
                <div class="sub-image-container"></div>
            </div>
        </div>
    </div>

    <!-- 底部控制台 -->
    <div id="toolbar" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur px-8 py-4 rounded-full shadow-2xl flex gap-6 items-center opacity-0 pointer-events-none transition-all z-50">
        <button onclick="triggerUpload()" class="flex flex-col items-center group">
            <div class="p-2 bg-slate-100 group-hover:bg-blue-100 rounded-lg transition"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></div>
            <span class="text-[10px] mt-1 font-bold text-slate-600">换图</span>
        </button>
        
        <button onclick="openCropModal()" class="flex flex-col items-center group">
            <div class="p-2 bg-slate-100 group-hover:bg-blue-100 rounded-lg transition"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 3v15M18 6v15M3 6h15M6 18h15"/></svg></div>
            <span class="text-[10px] mt-1 font-bold text-slate-600">裁剪编辑</span>
        </button>

        <!-- 新增：相框旋转功能 -->
        <div id="frameRotateBtn" class="flex flex-col items-center group cursor-pointer" onclick="rotateActiveFrame()">
            <div class="p-2 bg-slate-100 group-hover:bg-blue-100 rounded-lg transition"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg></div>
            <span class="text-[10px] mt-1 font-bold text-slate-600">旋转相框</span>
        </div>

        <div class="h-8 w-px bg-slate-200"></div>
        
        <button onclick="exportPhoto()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full font-bold text-sm transition">导出排版照片</button>
    </div>

    <!-- 裁剪编辑弹窗 -->
    <div id="cropModal" class="crop-modal">
        <div class="p-6 flex justify-between items-center border-b border-white/10">
            <button onclick="closeCropModal()" class="text-white/70 hover:text-white">取消</button>
            <span class="text-white font-bold tracking-wider">调整图片显示范围</span>
            <button onclick="applyCrop()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-bold transition">确认保存</button>
        </div>
        <div class="crop-viewport" id="cropViewport">
            <div id="cropWrapper">
                <img id="cropPreviewImg" src="" draggable="false">
                <div id="cropBox"></div>
            </div>
        </div>
        <div class="p-8 bg-zinc-900 space-y-6">
            <div class="max-w-md mx-auto space-y-4">
                <div class="flex justify-between text-xs text-zinc-400 font-bold uppercase"><span>图片缩放</span><span id="zoomLabel" class="text-blue-400">1.00x</span></div>
                <input type="range" id="cropZoom" min="0.01" max="5" step="0.001" oninput="updateCropTransform()" class="w-full accent-blue-500 cursor-pointer">
                <div class="flex justify-between text-xs text-zinc-400 font-bold uppercase pt-2"><span>图片旋转</span><span id="rotateLabel" class="text-blue-400">0°</span></div>
                <input type="range" id="cropRotate" min="-180" max="180" step="1" oninput="updateCropTransform()" class="w-full accent-blue-500 cursor-pointer">
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleFile(event)">

    <script>
        let activeSlot = null;
        const photoStates = new Map();
        let frameDragging = false, startX, startY, fLeft, fTop, activeFrame;

        let cropTemp = { x: 0, y: 0, scale: 1, rotate: 0, lastX: 0, lastY: 0, isDragging: false };
        let currentViewportScale = 1;

        const LOGIC_W = { main: 900, sub: 160 };
        const LOGIC_H = { main: 600, sub: 120 };

        function selectSlot(slot, id, e) {
            if (e) e.stopPropagation();
            if (activeSlot) activeSlot.classList.remove('active');
            activeSlot = slot;
            activeSlot.classList.add('active');
            
            const tb = document.getElementById('toolbar');
            tb.style.opacity = "1";
            tb.style.pointerEvents = "auto";
            tb.style.transform = "translate(-50%, 0)";

            // 如果选中的是主背景，隐藏“旋转相框”按钮
            document.getElementById('frameRotateBtn').style.display = (id === 'main') ? 'none' : 'flex';
        }

        function deselectAll(e) {
            if (e.target.id === 'capture-area' || e.target.classList.contains('canvas-viewport')) {
                if (activeSlot) activeSlot.classList.remove('active');
                activeSlot = null;
                const tb = document.getElementById('toolbar');
                tb.style.opacity = "0";
                tb.style.pointerEvents = "none";
                tb.style.transform = "translate(-50%, 20px)";
            }
        }

        // 新增：旋转选中的相框角度
        function rotateActiveFrame() {
            if (!activeSlot || activeSlot.dataset.id === 'main') return;
            
            // 获取当前旋转角度
            const style = window.getComputedStyle(activeSlot);
            const matrix = new DOMMatrixReadOnly(style.transform);
            let currentAngle = Math.round(Math.atan2(matrix.b, matrix.a) * (180 / Math.PI));
            
            // 每次点击顺时针旋转 5 度
            let newAngle = currentAngle + 5;
            activeSlot.style.transform = `rotate(${newAngle}deg)`;
        }

        function triggerUpload() { document.getElementById('fileInput').click(); }

        function handleFile(event) {
            const file = event.target.files[0];
            if (!file || !activeSlot) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const id = activeSlot.dataset.id;
                const type = id === 'main' ? 'main' : 'sub';
                const container = activeSlot.querySelector('.sub-image-container') || activeSlot;
                
                let img = container.querySelector('img');
                if (!img) {
                    img = document.createElement('img');
                    container.appendChild(img);
                }
                img.src = e.target.result;
                img.onload = () => {
                    img.width = img.naturalWidth;
                    img.height = img.naturalHeight;
                    img.style.display = 'block';
                    const fitScale = Math.max(LOGIC_W[type] / img.naturalWidth, LOGIC_H[type] / img.naturalHeight);
                    const state = {
                        x: (LOGIC_W[type] - img.naturalWidth) / 2,
                        y: (LOGIC_H[type] - img.naturalHeight) / 2,
                        scale: fitScale,
                        rotate: 0
                    };
                    photoStates.set(id, state);
                    renderImg(img, state);
                };
            };
            reader.readAsDataURL(file);
            event.target.value = '';
        }

        function renderImg(img, state) {
            img.style.transform = `translate(${state.x}px, ${state.y}px) scale(${state.scale}) rotate(${state.rotate}deg)`;
        }

        function openCropModal() {
            if (!activeSlot) return;
            const img = activeSlot.querySelector('img');
            if (!img) return;

            const id = activeSlot.dataset.id;
            const type = id === 'main' ? 'main' : 'sub';
            const state = photoStates.get(id);

            const modal = document.getElementById('cropModal');
            const preview = document.getElementById('cropPreviewImg');
            const wrapper = document.getElementById('cropWrapper');

            preview.src = img.src;
            preview.width = img.naturalWidth;
            preview.height = img.naturalHeight;

            wrapper.style.width = LOGIC_W[type] + 'px';
            wrapper.style.height = LOGIC_H[type] + 'px';

            const screenW = window.innerWidth * 0.85;
            const screenH = window.innerHeight * 0.6;
            currentViewportScale = Math.min(screenW / LOGIC_W[type], screenH / LOGIC_H[type]);
            wrapper.style.transform = `scale(${currentViewportScale})`;

            cropTemp = { ...state, isDragging: false };

            const fitScale = Math.max(LOGIC_W[type] / img.naturalWidth, LOGIC_H[type] / img.naturalHeight);
            const zs = document.getElementById('cropZoom');
            zs.min = fitScale * 0.1;
            zs.max = fitScale * 10;
            zs.value = cropTemp.scale;
            document.getElementById('cropRotate').value = cropTemp.rotate;

            updateCropTransform();
            modal.style.display = 'flex';
        }

        function updateCropTransform() {
            cropTemp.scale = parseFloat(document.getElementById('cropZoom').value);
            cropTemp.rotate = parseInt(document.getElementById('cropRotate').value);
            
            const preview = document.getElementById('cropPreviewImg');
            const id = activeSlot.dataset.id;
            const type = id === 'main' ? 'main' : 'sub';
            
            const fitScale = Math.max(LOGIC_W[type] / preview.naturalWidth, LOGIC_H[type] / preview.naturalHeight);
            document.getElementById('zoomLabel').innerText = (cropTemp.scale / fitScale).toFixed(2) + 'x';
            document.getElementById('rotateLabel').innerText = cropTemp.rotate + '°';
            
            renderImg(preview, cropTemp);
        }

        function applyCrop() {
            const id = activeSlot.dataset.id;
            const state = { x: cropTemp.x, y: cropTemp.y, scale: cropTemp.scale, rotate: cropTemp.rotate };
            photoStates.set(id, state);
            renderImg(activeSlot.querySelector('img'), state);
            closeCropModal();
        }

        function closeCropModal() { document.getElementById('cropModal').style.display = 'none'; }

        document.addEventListener('mousedown', (e) => {
            if (e.target.id === 'cropPreviewImg') {
                cropTemp.isDragging = true;
                cropTemp.lastX = e.clientX;
                cropTemp.lastY = e.clientY;
                return;
            }
            const frame = e.target.closest('.sub-slot-frame');
            if (frame && document.getElementById('cropModal').style.display !== 'flex') {
                activeFrame = frame;
                frameDragging = true;
                startX = e.clientX; startY = e.clientY;
                fLeft = frame.offsetLeft; fTop = frame.offsetTop;
                selectSlot(frame, frame.dataset.id);
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (cropTemp.isDragging) {
                cropTemp.x += (e.clientX - cropTemp.lastX) / currentViewportScale;
                cropTemp.y += (e.clientY - cropTemp.lastY) / currentViewportScale;
                cropTemp.lastX = e.clientX;
                cropTemp.lastY = e.clientY;
                updateCropTransform();
            }
            if (frameDragging && activeFrame) {
                activeFrame.style.left = (fLeft + e.clientX - startX) + 'px';
                activeFrame.style.top = (fTop + e.clientY - startY) + 'px';
            }
        });

        document.addEventListener('mouseup', () => {
            cropTemp.isDragging = false;
            frameDragging = false;
        });

        async function exportPhoto() {
            const area = document.getElementById('capture-area');
            const prevActive = activeSlot;
            if (activeSlot) activeSlot.classList.remove('active');
            
            try {
                const canvas = await html2canvas(area, { 
                    scale: 3, 
                    useCORS: true,
                    backgroundColor: '#ffffff'
                });
                const link = document.createElement('a');
                link.download = `Photo_Layout_${Date.now()}.jpg`;
                link.href = canvas.toDataURL('image/jpeg', 0.95);
                link.click();
            } catch (err) { alert("导出失败，请重试"); }
            finally { if (prevActive) prevActive.classList.add('active'); }
        }
    </script>
</body>
</html>
