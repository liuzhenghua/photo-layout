<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4x6满幅四联排版工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            /* 模拟 4x6 比例，600x900 */
            --canvas-w: 600px;
            --canvas-h: 900px;
            /* 满幅尺寸：每张图刚好是 300x450 */
            --slot-w: 300px;
            --slot-h: 450px;
        }
        body { touch-action: manipulation; }
        .canvas-viewport {
            width: 100%;
            overflow: auto;
            display: flex;
            justify-content: center;
            padding: 20px 0;
            background: #f1f5f9;
        }
        /* 6寸竖版画布 */
        .photo-canvas {
            width: var(--canvas-w);
            height: var(--canvas-h);
            background: #fff;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
            /* 增加一个非常细的灰色边框模拟相纸边缘 */
            border: 1px solid #e2e8f0;
        }
        
        /* 极细裁剪参考线：不占用物理空间，仅作视觉引导 */
        .cut-line-h {
            position: absolute;
            top: 50%; left: 0; right: 0;
            height: 1px;
            background: rgba(0,0,0,0.1); /* 极淡的线 */
            z-index: 30;
            pointer-events: none;
        }
        .cut-line-v {
            position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 1px;
            background: rgba(0,0,0,0.1);
            z-index: 30;
            pointer-events: none;
        }

        /* 照片槽位：无缝排列 */
        .photo-slot {
            position: absolute;
            width: var(--slot-w);
            height: var(--slot-h);
            background: #fafafa;
            overflow: hidden;
            cursor: pointer;
            z-index: 10;
            touch-action: none;
        }
        /* 激活状态：使用内阴影而非外描边，不影响布局 */
        .photo-slot.active {
            box-shadow: inset 0 0 0 4px #3b82f6;
            z-index: 20;
        }
        .photo-slot img {
            position: absolute;
            top: 0; left: 0;
            transform-origin: center center;
            pointer-events: none;
            max-width: none !important;
            max-height: none !important;
        }
        .slot-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #cbd5e1;
            font-size: 14px;
            pointer-events: none;
            border: 1px dashed #f1f5f9;
        }

        /* 裁剪弹窗 */
        .crop-modal {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: none;
            flex-direction: column;
        }
        #cropWrapper {
            position: relative;
            transform-origin: center center;
            background: #111;
        }
        #cropBox {
            position: absolute;
            inset: 0;
            border: 2px solid #3b82f6;
            box-shadow: 0 0 0 5000px rgba(0,0,0,0.7);
            z-index: 20;
            pointer-events: none;
        }
        #cropPreviewImg {
            position: absolute;
            top: 0; left: 0;
            cursor: move;
            touch-action: none;
            transform-origin: center center;
            max-width: none !important;
            max-height: none !important;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="py-4 text-center">
        <h1 class="text-lg font-bold text-slate-800">4x6寸满幅拼图 (4张3寸)</h1>
        <p class="text-slate-400 text-[10px]">无缝排列模式：每张图均等于标准的 2x3 英寸</p>
    </div>

    <div class="canvas-viewport" onclick="deselectAll(event)">
        <div id="capture-area" class="photo-canvas">
            <!-- 极细参考线 -->
            <div class="cut-line-h"></div>
            <div class="cut-line-v"></div>

            <!-- 四张照片无缝排列 -->
            <div class="photo-slot" style="top: 0; left: 0;" data-id="p1" onclick="selectSlot(this, event)">
                <div class="slot-placeholder">点击上传</div>
            </div>
            <div class="photo-slot" style="top: 0; left: 300px;" data-id="p2" onclick="selectSlot(this, event)">
                <div class="slot-placeholder">点击上传</div>
            </div>
            <div class="photo-slot" style="top: 450px; left: 0;" data-id="p3" onclick="selectSlot(this, event)">
                <div class="slot-placeholder">点击上传</div>
            </div>
            <div class="photo-slot" style="top: 450px; left: 300px;" data-id="p4" onclick="selectSlot(this, event)">
                <div class="slot-placeholder">点击上传</div>
            </div>
        </div>
    </div>

    <!-- 底部工具栏 -->
    <div id="toolbar" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white shadow-2xl px-6 py-3 rounded-2xl flex gap-6 items-center opacity-0 pointer-events-none transition-all z-50 border border-slate-100">
        <button onclick="triggerUpload()" class="flex flex-col items-center gap-1">
            <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
            </div>
            <span class="text-[10px] font-bold text-slate-400">换图</span>
        </button>
        <button onclick="openCropModal()" class="flex flex-col items-center gap-1">
            <div class="w-10 h-10 bg-slate-50 text-slate-600 rounded-full flex items-center justify-center">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 3v15M18 6v15M3 6h15M6 18h15"/></svg>
            </div>
            <span class="text-[10px] font-bold text-slate-400">调整</span>
        </button>
        <div class="h-10 w-px bg-slate-100"></div>
        <button onclick="exportPhoto()" class="bg-blue-600 text-white px-6 py-2.5 rounded-full font-bold text-sm shadow-lg shadow-blue-200">下载 6寸大图</button>
    </div>

    <!-- 编辑弹窗 -->
    <div id="cropModal" class="crop-modal">
        <div class="p-4 flex justify-between items-center bg-black/80 backdrop-blur">
            <button onclick="closeCropModal()" class="text-white/50 text-sm">取消</button>
            <span class="text-white text-xs font-medium">拖动图片调整位置</span>
            <button onclick="applyCrop()" class="bg-blue-600 text-white px-5 py-1.5 rounded-full text-sm font-bold">保存修改</button>
        </div>
        <div class="flex-1 flex items-center justify-center overflow-hidden" id="cropViewport">
            <div id="cropWrapper">
                <img id="cropPreviewImg" src="" draggable="false">
                <div id="cropBox"></div>
            </div>
        </div>
        <div class="p-6 bg-black">
            <div class="max-w-xs mx-auto space-y-5">
                <div>
                    <div class="flex justify-between text-[10px] text-zinc-500 font-bold tracking-widest uppercase mb-2">
                        <span>缩放级别</span>
                        <span id="zoomLabel" class="text-blue-400">1.0x</span>
                    </div>
                    <input type="range" id="cropZoom" min="0.1" max="3" step="0.01" oninput="updateCropTransform()" class="w-full h-1.5 bg-zinc-800 rounded-lg appearance-none accent-blue-500">
                </div>
                <div>
                    <div class="flex justify-between text-[10px] text-zinc-500 font-bold tracking-widest uppercase mb-2">
                        <span>旋转角度</span>
                        <span id="rotateLabel" class="text-blue-400">0°</span>
                    </div>
                    <input type="range" id="cropRotate" min="-180" max="180" step="1" value="0" oninput="updateCropTransform()" class="w-full h-1.5 bg-zinc-800 rounded-lg appearance-none accent-blue-500">
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleFile(event)">

    <script>
        let activeSlot = null;
        const photoStates = new Map();
        let cropTemp = { x: 0, y: 0, scale: 1, rotate: 0, lastX: 0, lastY: 0, isDragging: false };
        let viewScale = 1;

        const SLOT_W = 300;
        const SLOT_H = 450;

        function selectSlot(slot, e) {
            if (e) e.stopPropagation();
            if (activeSlot) activeSlot.classList.remove('active');
            activeSlot = slot;
            activeSlot.classList.add('active');
            const tb = document.getElementById('toolbar');
            tb.style.opacity = "1";
            tb.style.pointerEvents = "auto";
            tb.style.transform = "translate(-50%, -10px)";
        }

        function deselectAll(e) {
            if (e.target.id === 'capture-area' || e.target.classList.contains('canvas-viewport')) {
                if (activeSlot) activeSlot.classList.remove('active');
                activeSlot = null;
                const tb = document.getElementById('toolbar');
                tb.style.opacity = "0";
                tb.style.pointerEvents = "none";
                tb.style.transform = "translate(-50%, 20px)";
            }
        }

        function triggerUpload() { document.getElementById('fileInput').click(); }

        function handleFile(event) {
            const file = event.target.files[0];
            if (!file || !activeSlot) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                let img = activeSlot.querySelector('img');
                if (!img) {
                    img = document.createElement('img');
                    activeSlot.querySelector('.slot-placeholder').style.display = 'none';
                    activeSlot.appendChild(img);
                }
                img.src = e.target.result;
                img.onload = () => {
                    const fitScale = Math.max(SLOT_W / img.naturalWidth, SLOT_H / img.naturalHeight);
                    const state = {
                        x: (SLOT_W - img.naturalWidth) / 2,
                        y: (SLOT_H - img.naturalHeight) / 2,
                        scale: fitScale,
                        rotate: 0
                    };
                    photoStates.set(activeSlot.dataset.id, state);
                    img.style.transform = `translate(${state.x}px, ${state.y}px) rotate(${state.rotate}deg) scale(${state.scale})`;
                };
            };
            reader.readAsDataURL(file);
        }

        function openCropModal() {
            if (!activeSlot) return;
            const img = activeSlot.querySelector('img');
            if (!img) return triggerUpload();

            const state = photoStates.get(activeSlot.dataset.id);
            const modal = document.getElementById('cropModal');
            const preview = document.getElementById('cropPreviewImg');
            const wrapper = document.getElementById('cropWrapper');

            preview.src = img.src;
            wrapper.style.width = SLOT_W + 'px';
            wrapper.style.height = SLOT_H + 'px';

            const screenW = window.innerWidth * 0.85;
            const screenH = window.innerHeight * 0.6;
            viewScale = Math.min(screenW / SLOT_W, screenH / SLOT_H);
            wrapper.style.transform = `scale(${viewScale})`;

            cropTemp = { ...state, isDragging: false };
            
            // 动态设置滑动条的范围，以适配不同分辨率的图片
            const zoomSlider = document.getElementById('cropZoom');
            zoomSlider.min = (cropTemp.scale * 0.2).toFixed(4);
            zoomSlider.max = (cropTemp.scale * 4).toFixed(4);
            zoomSlider.step = (cropTemp.scale * 0.01).toFixed(4);
            zoomSlider.value = cropTemp.scale;
            
            document.getElementById('cropRotate').value = cropTemp.rotate || 0;
            
            updateCropTransform();
            modal.style.display = 'flex';
        }

        function updateCropTransform() {
            const newScale = parseFloat(document.getElementById('cropZoom').value);
            const oldScale = cropTemp.scale;
            const newRotate = parseInt(document.getElementById('cropRotate').value) || 0;
            
            if (oldScale !== newScale) {
                // 确保滑动缩放时，永远以相框正中心为焦距锚点
                const img = activeSlot.querySelector('img');
                const cx = SLOT_W / 2;
                const cy = SLOT_H / 2;
                const imgCx = cropTemp.x + img.naturalWidth / 2;
                const imgCy = cropTemp.y + img.naturalHeight / 2;
                const vx = cx - imgCx;
                const vy = cy - imgCy;
                cropTemp.x += vx * (1 - newScale / oldScale);
                cropTemp.y += vy * (1 - newScale / oldScale);
                cropTemp.scale = newScale;
            }

            cropTemp.rotate = newRotate;

            // 计算相对显示比例 (1.0x = 恰好填满，对用户更直观)
            const img = activeSlot.querySelector('img');
            const fitScale = Math.max(SLOT_W / img.naturalWidth, SLOT_H / img.naturalHeight);
            const displayZoom = (cropTemp.scale / fitScale).toFixed(2);
            document.getElementById('zoomLabel').innerText = displayZoom + 'x';
            document.getElementById('rotateLabel').innerText = cropTemp.rotate + '°';

            const preview = document.getElementById('cropPreviewImg');
            preview.style.transform = `translate(${cropTemp.x}px, ${cropTemp.y}px) rotate(${cropTemp.rotate}deg) scale(${cropTemp.scale})`;
        }

        function applyCrop() {
            const state = { x: cropTemp.x, y: cropTemp.y, scale: cropTemp.scale, rotate: cropTemp.rotate };
            photoStates.set(activeSlot.dataset.id, state);
            const img = activeSlot.querySelector('img');
            img.style.transform = `translate(${state.x}px, ${state.y}px) rotate(${state.rotate}deg) scale(${state.scale})`;
            closeCropModal();
        }

        function closeCropModal() { document.getElementById('cropModal').style.display = 'none'; }

        // 事件监听
        function onStart(e) {
            if (e.target.id === 'cropPreviewImg') {
                const t = e.touches ? e.touches[0] : e;
                cropTemp.isDragging = true;
                cropTemp.lastX = t.clientX;
                cropTemp.lastY = t.clientY;
            }
        }
        function onMove(e) {
            if (cropTemp.isDragging) {
                const t = e.touches ? e.touches[0] : e;
                cropTemp.x += (t.clientX - cropTemp.lastX) / viewScale;
                cropTemp.y += (t.clientY - cropTemp.lastY) / viewScale;
                cropTemp.lastX = t.clientX;
                cropTemp.lastY = t.clientY;
                
                // 直接渲染新坐标，防止干扰滑动条
                const preview = document.getElementById('cropPreviewImg');
                preview.style.transform = `translate(${cropTemp.x}px, ${cropTemp.y}px) rotate(${cropTemp.rotate}deg) scale(${cropTemp.scale})`;
                e.preventDefault();
            }
        }
        function onEnd() { cropTemp.isDragging = false; }

        document.addEventListener('mousedown', onStart);
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onEnd);
        document.addEventListener('touchstart', onStart, {passive: false});
        document.addEventListener('touchmove', onMove, {passive: false});
        document.addEventListener('touchend', onEnd);

        async function exportPhoto() {
            const area = document.getElementById('capture-area');
            const prevActive = activeSlot;
            if (activeSlot) activeSlot.classList.remove('active');
            
            try {
                const canvas = await html2canvas(area, { scale: 4, useCORS: true });
                const link = document.createElement('a');
                link.download = `Photo_4x6_Full.jpg`;
                link.href = canvas.toDataURL('image/jpeg', 0.95);
                link.click();
            } catch (err) { console.error(err); }
            finally { if (prevActive) prevActive.classList.add('active'); }
        }
    </script>
</body>
</html>
