<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>4x6竖版精修排版工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --canvas-w: 600px;
            --canvas-h: 900px;
            --sub-w: 175px;
            --sub-h: 120px;
        }

        body { 
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }

        /* 视口与缩放器 */
        .canvas-viewport {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 10px;
            background: #f8fafc;
            min-height: calc(100vh - 160px);
            overflow: hidden;
        }

        .canvas-scaler {
            transform-origin: top center;
            transition: transform 0.2s ease;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .photo-canvas {
            width: var(--canvas-w);
            height: var(--canvas-h);
            background: #fff;
            position: relative;
            overflow: hidden;
        }

        /* 背景大图 Slot */
        .main-slot {
            position: absolute; inset: 0;
            background: #f1f5f9;
            overflow: hidden;
            cursor: pointer;
            z-index: 1;
        }
        
        .main-slot .placeholder {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #cbd5e1; pointer-events: none;
        }

        /* 小相框 Slot */
        .sub-slot-frame {
            position: absolute;
            background: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 10;
            cursor: move;
            padding: 3px; /* 白边宽度 */
            transition: box-shadow 0.2s;
            touch-action: none;
        }

        .sub-slot-frame.active {
            box-shadow: 0 0 0 2px #3b82f6, 0 10px 25px rgba(0,0,0,0.2);
            z-index: 100 !important;
        }

        .sub-image-container {
            width: var(--sub-w);
            height: var(--sub-h);
            background: #e2e8f0;
            overflow: hidden;
            position: relative;
            min-width: 40px;
            min-height: 30px;
        }

        /* Resize handle */
        .sub-slot-frame .resizer {
            position: absolute;
            width: 14px;
            height: 14px;
            right: 0;
            bottom: 0;
            background: transparent;
            z-index: 110;
            touch-action: none;
        }

        .sub-slot-frame .resizer::after {
            content: '';
            position: absolute;
            right: 3px;
            bottom: 3px;
            width: 10px;
            height: 10px;
            border-right: 2px solid rgba(0,0,0,0.18);
            border-bottom: 2px solid rgba(0,0,0,0.18);
            border-radius: 1px;
        }

        .sub-slot-frame .resizer:hover { cursor: nwse-resize; }

        /* 通用图片样式 */
        img.canvas-img {
            position: absolute;
            top: 0; left: 0;
            transform-origin: center center;
            pointer-events: none;
            display: none;
            max-width: none !important;
            max-height: none !important;
        }

        /* 裁剪弹窗 */
        .crop-modal {
            position: fixed; inset: 0;
            background: #000; z-index: 1000;
            display: none; flex-direction: column;
        }
        
        #cropSizer {
            overflow: hidden;
            flex-shrink: 0;
        }

        #cropWrapper {
            position: relative;
            transform-origin: top left;
            background: #111;
        }

        #cropBox {
            position: absolute; inset: 0;
            border: 1px solid #3b82f6;
            box-shadow: 0 0 0 5000px rgba(0,0,0,0.8);
            z-index: 20; pointer-events: none;
        }

        #cropPreviewImg {
            position: absolute; top: 0; left: 0;
            cursor: move; touch-action: none;
            transform-origin: center center;
            max-width: none !important;
            max-height: none !important;
        }

        /* Loading */
        #exportLoading {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            flex-direction: column;
            align-items: center; justify-content: center;
            color: white;
            backdrop-filter: blur(5px);
        }

        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 20px); }
        
        /* Range Input Style */
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #333; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #3b82f6; margin-top: -8px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <!-- 顶部导航 -->
    <header class="bg-white/90 backdrop-blur sticky top-0 z-40 px-4 py-3 flex justify-between items-center border-b border-slate-200 shadow-sm">
        <div>
            <h1 class="text-sm font-bold text-slate-800">4x6 竖版六联</h1>
            <div class="flex items-center gap-2 mt-0.5">
                <span class="text-[10px] text-slate-400">底图 4:6 | 小图 175x120</span>
                <select id="exportQuality" class="text-[10px] bg-slate-100 border-none rounded px-1 py-0.5 font-bold text-blue-600 focus:ring-0">
                    <option value="1">预览 (600x900)</option>
                    <option value="2">高清 (1200x1800 / 300DPI)</option>
                    <option value="3" selected>超清 (1800x2700 / 450DPI)</option>
                </select>
            </div>
        </div>
        <button onclick="exportPhoto()" class="bg-blue-600 text-white px-4 py-1.5 rounded-full text-xs font-bold shadow-md active:scale-95 transition">导出</button>
    </header>

    <!-- 主画布区域 -->
    <main class="flex-1 canvas-viewport" onclick="deselectAll(event)">
        <div id="scaler" class="canvas-scaler">
            <div id="capture-area" class="photo-canvas">
                
                <!-- 背景大图 -->
                <div class="main-slot" data-id="main" onclick="selectSlot(this, event)">
                    <div class="placeholder">
                        <svg class="w-12 h-12 mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <span class="text-xs font-bold uppercase tracking-widest">点击上传背景</span>
                    </div>
                    <img class="canvas-img" src="" alt="">
                </div>

                <!-- 第一排相框 -->
                <div class="sub-slot-frame" style="top: 565px; left: 30px; transform: rotate(-2deg); z-index: 11;" data-id="sub1" onmousedown="startFrameDrag(this, event)" ontouchstart="startFrameDrag(this, event)">
                    <div class="sub-image-container">
                        <img class="canvas-img" src="" alt="">
                    </div>
                </div>
                <div class="sub-slot-frame" style="top: 560px; left: 210px; transform: rotate(1deg); z-index: 12;" data-id="sub2" onmousedown="startFrameDrag(this, event)" ontouchstart="startFrameDrag(this, event)">
                    <div class="sub-image-container">
                        <img class="canvas-img" src="" alt="">
                    </div>
                </div>
                <div class="sub-slot-frame" style="top: 565px; left: 390px; transform: rotate(-1.5deg); z-index: 13;" data-id="sub3" onmousedown="startFrameDrag(this, event)" ontouchstart="startFrameDrag(this, event)">
                    <div class="sub-image-container">
                        <img class="canvas-img" src="" alt="">
                    </div>
                </div>

                <!-- 第二排相框 -->
                <div class="sub-slot-frame" style="top: 725px; left: 35px; transform: rotate(2deg); z-index: 14;" data-id="sub4" onmousedown="startFrameDrag(this, event)" ontouchstart="startFrameDrag(this, event)">
                    <div class="sub-image-container">
                        <img class="canvas-img" src="" alt="">
                    </div>
                </div>
                <div class="sub-slot-frame" style="top: 720px; left: 215px; transform: rotate(-1.5deg); z-index: 15;" data-id="sub5" onmousedown="startFrameDrag(this, event)" ontouchstart="startFrameDrag(this, event)">
                    <div class="sub-image-container">
                        <img class="canvas-img" src="" alt="">
                    </div>
                </div>
                <div class="sub-slot-frame" style="top: 725px; left: 395px; transform: rotate(1.5deg); z-index: 16;" data-id="sub6" onmousedown="startFrameDrag(this, event)" ontouchstart="startFrameDrag(this, event)">
                    <div class="sub-image-container">
                        <img class="canvas-img" src="" alt="">
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- 底部工具栏 -->
    <div id="toolbar" class="fixed bottom-0 left-0 right-0 bg-white shadow-[0_-10px_40px_rgba(0,0,0,0.05)] translate-y-full transition-transform duration-300 z-50 border-t border-slate-100 safe-bottom">
        <div class="flex justify-around p-4 items-center">
            <!-- 新增小相框按钮 -->
            <button onclick="addFrame()" class="flex flex-col items-center gap-1 group w-14">
                <div class="w-10 h-10 bg-green-50 text-green-600 rounded-xl flex items-center justify-center group-active:scale-90 transition">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
                </div>
                <span class="text-[10px] font-bold text-slate-500">新增</span>
            </button>

            <button onclick="triggerUpload()" class="flex flex-col items-center gap-1 group w-14">
                <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center group-active:scale-90 transition">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                </div>
                <span class="text-[10px] font-bold text-slate-500">换图</span>
            </button>
            
            <button id="btnCrop" onclick="openCropModal()" class="flex flex-col items-center gap-1 group w-14 opacity-50 pointer-events-none transition-opacity">
                <div class="w-10 h-10 bg-slate-50 text-slate-600 rounded-xl flex items-center justify-center group-active:scale-90 transition">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 3v15M18 6v15M3 6h15M6 18h15"/></svg>
                </div>
                <span class="text-[10px] font-bold text-slate-500">裁剪</span>
            </button>

            <!-- 仅小相框显示的旋转按钮：先逆时针，再顺时针 -->
            <button id="btnRotateLeft" onclick="rotateActiveFrame(-5)" class="flex flex-col items-center gap-1 group w-14 hidden">
                <div class="w-10 h-10 bg-purple-50 text-purple-600 rounded-xl flex items-center justify-center group-active:scale-90 transition">
                    <!-- 左箭头 -->
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 4l-5 8 5 8"/></svg>
                </div>
                <span class="text-[10px] font-bold text-slate-500">左转</span>
            </button>
            <button id="btnRotateRight" onclick="rotateActiveFrame(5)" class="flex flex-col items-center gap-1 group w-14 hidden">
                <div class="w-10 h-10 bg-purple-50 text-purple-600 rounded-xl flex items-center justify-center group-active:scale-90 transition">
                    <!-- 右箭头 -->
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 4l5 8-5 8"/></svg>
                </div>
                <span class="text-[10px] font-bold text-slate-500">右转</span>
            </button>

            <button onclick="clearSlot()" class="flex flex-col items-center gap-1 group w-14">
                <div class="w-10 h-10 bg-red-50 text-red-500 rounded-xl flex items-center justify-center group-active:scale-90 transition">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                </div>
                <span class="text-[10px] font-bold text-slate-500">移除</span>
            </button>
        </div>
    </div>

    <!-- 裁剪弹窗 -->
    <div id="cropModal" class="crop-modal">
        <div class="p-4 flex justify-between items-center bg-black/80 backdrop-blur safe-top">
            <button onclick="closeCropModal()" class="text-white/40 text-sm px-2">取消</button>
            <span class="text-white text-xs font-bold tracking-widest uppercase">编辑照片</span>
            <button onclick="applyCrop()" class="bg-blue-600 text-white px-5 py-2 rounded-full text-xs font-bold">保存</button>
        </div>
        <div class="flex-1 flex items-center justify-center overflow-hidden p-4" id="cropViewport">
            <div id="cropSizer">
                <div id="cropWrapper">
                    <img id="cropPreviewImg" src="" draggable="false">
                    <div id="cropBox"></div>
                </div>
            </div>
        </div>
        <div class="p-8 bg-zinc-950 safe-bottom">
            <div class="max-w-xs mx-auto space-y-6">
                <div>
                    <div class="flex justify-between text-[10px] text-zinc-500 font-black mb-2"><span>缩放</span><span id="zoomLabel" class="text-blue-500">1.0X</span></div>
                    <input type="range" id="cropZoom" min="0.1" max="3" step="0.01" oninput="updateCropTransform()">
                </div>
                <div>
                    <div class="flex justify-between text-[10px] text-zinc-500 font-black mb-2"><span>旋转</span><span id="rotateLabel" class="text-blue-500">0°</span></div>
                    <input type="range" id="cropRotate" min="-180" max="180" step="1" oninput="updateCropTransform()">
                </div>
            </div>
        </div>
    </div>

    <!-- 导出 Loading -->
    <div id="exportLoading">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-blue-500 border-t-transparent mb-4"></div>
        <p class="text-sm font-medium">正在生成高清图片...</p>
        <p class="text-[10px] text-zinc-400 mt-2">Render Engine v2.0</p>
    </div>

    <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleFile(event)">

    <script>
        let activeSlot = null;
        const photoStates = new Map();
        
        // 裁剪相关状态
        let cropTemp = { x: 0, y: 0, scale: 1, rotate: 0, lastX: 0, lastY: 0, isDragging: false };
        let viewScale = 1;
        
        // 相框拖拽相关状态
        let frameDragState = { isDragging: false, startX: 0, startY: 0, initialLeft: 0, initialTop: 0 };

        // 尺寸常量
        const LOGIC_W = { main: 600, sub: 175 };
        const LOGIC_H = { main: 900, sub: 120 };

        // resize state for sub frames
        let resizeState = { isResizing: false, frame: null, startX: 0, startY: 0, initialW: 0, initialH: 0 };

        // 自动缩放画布以适应屏幕
        function autoScaleCanvas() {
            const container = document.querySelector('.canvas-viewport');
            const scaler = document.getElementById('scaler');
            const cw = container.clientWidth - 20; // padding
            // 计算缩放比例，最多缩放到1.0，防止PC端过大
            const scale = Math.min(cw / 600, 1);
            scaler.style.transform = `scale(${scale})`;
            scaler.style.marginBottom = `${(900 * scale) - 900}px`; // 修正缩放后的留白
        }
        window.addEventListener('resize', autoScaleCanvas);
        window.addEventListener('load', () => { autoScaleCanvas(); initSubContainers(); });

        // Ensure existing sub frames have resizers and initial sizes
        function initSubContainers() {
            document.querySelectorAll('.sub-slot-frame').forEach((frame) => {
                const container = frame.querySelector('.sub-image-container');
                if (!container) return;

                // initialize size from logical defaults if not set
                if (!frame.dataset.w) {
                    frame.dataset.w = LOGIC_W.sub;
                    frame.dataset.h = LOGIC_H.sub;
                }
                container.style.width = parseFloat(frame.dataset.w) + 'px';
                container.style.height = parseFloat(frame.dataset.h) + 'px';

                // if there's already an image inside, refit it to the container
                const img = container.querySelector('img.canvas-img');
                if (img && img.src && img.naturalWidth) {
                    const nw = img.naturalWidth;
                    const nh = img.naturalHeight;
                    const w = parseFloat(frame.dataset.w);
                    const h = parseFloat(frame.dataset.h);
                    const fitScale = Math.max(w / nw, h / nh);
                    const x = (w - nw * fitScale) / (2 * fitScale);
                    const y = (h - nh * fitScale) / (2 * fitScale);
                    const id = frame.dataset.id;
                    const state = { x, y, scale: fitScale, rotate: 0 };
                    photoStates.set(id, state);
                    img.style.width = nw + 'px';
                    img.style.height = nh + 'px';
                    img.style.display = 'block';
                    applyImgStyle(img, state);
                }

                // add resizer handle if missing
                if (!frame.querySelector('.resizer')) {
                    const r = document.createElement('div');
                    r.className = 'resizer se';
                    r.onmousedown = (e) => startResize(frame, e);
                    r.ontouchstart = (e) => startResize(frame, e);
                    frame.appendChild(r);
                }
            });
        }

        // 选中 Slot（区分背景 main 和小相框 sub）
        function selectSlot(element, e) {
            if (e) e.stopPropagation();
            if (activeSlot) activeSlot.classList.remove('active');
            
            activeSlot = element;
            activeSlot.classList.add('active');
            
            const id = activeSlot.dataset.id;
            const isMain = id === 'main';
            const hasImg = photoStates.has(id);

            // 更新工具栏状态
            document.getElementById('toolbar').style.transform = "translateY(0)";
            const showRotate = isMain ? 'none' : 'flex';
            document.getElementById('btnRotateLeft').style.display = showRotate;
            document.getElementById('btnRotateRight').style.display = showRotate;
            
            const btnCrop = document.getElementById('btnCrop');
            btnCrop.style.opacity = hasImg ? "1" : "0.5";
            btnCrop.style.pointerEvents = hasImg ? "auto" : "none";
        }

        // 点击空白处取消选中
        function deselectAll(e) {
            if (e.target.classList.contains('canvas-viewport') || e.target.id === 'capture-area') {
                if (activeSlot) activeSlot.classList.remove('active');
                activeSlot = null;
                document.getElementById('toolbar').style.transform = "translateY(100%)";
            }
        }

        // 文件处理
        function triggerUpload() { 
            document.getElementById('fileInput').value = ''; 
            document.getElementById('fileInput').click(); 
        }

        function handleFile(event) {
            const file = event.target.files[0];
            if (!file || !activeSlot) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const id = activeSlot.dataset.id;
                const type = id === 'main' ? 'main' : 'sub';
                
                // 获取 img 元素 (背景直接是 img，小相框是在 container 里的 img)
                let img = activeSlot.querySelector('img.canvas-img');
                const placeholder = activeSlot.querySelector('.placeholder');
                
                img.src = e.target.result;
                img.style.display = 'block';
                if(placeholder) placeholder.style.display = 'none';

                img.onload = () => {
                    // 计算初始适配比例 (Cover 模式)
                    let w = LOGIC_W[type];
                    let h = LOGIC_H[type];
                    if (type === 'sub') {
                        const fw = parseFloat(activeSlot.dataset.w);
                        const fh = parseFloat(activeSlot.dataset.h);
                        if (!isNaN(fw) && !isNaN(fh)) { w = fw; h = fh; }
                    }
                    const fitScale = Math.max(w / img.naturalWidth, h / img.naturalHeight);

                    // 因为 transform 顺序为 translate -> rotate -> scale，
                    // translate 会被后续的 scale 放大。所以这里计算出的 x/y 应
                    // 保证缩放后视觉上图片中心处于裁剪框中心。
                    const x = (w - img.naturalWidth * fitScale) / (2 * fitScale);
                    const y = (h - img.naturalHeight * fitScale) / (2 * fitScale);

                    let state = { x: x, y: y, scale: fitScale, rotate: 0 };
                    // ensure the image element has explicit intrinsic size so transforms are predictable
                    img.style.width = img.naturalWidth + 'px';
                    img.style.height = img.naturalHeight + 'px';
                    img.style.display = 'block';
                    img.style.opacity = '1';

                    // normalize & clamp so the image immediately covers the container
                    state = normalizeAndClampStateForFrame(activeSlot, img, state);
                    photoStates.set(id, state);
                    applyImgStyle(img, state);
                    
                    // 激活裁剪按钮
                    document.getElementById('btnCrop').style.opacity = "1";
                    document.getElementById('btnCrop').style.pointerEvents = "auto";
                };
            };
            reader.readAsDataURL(file);
        }

        function applyImgStyle(img, state) {
            img.style.transform = `translate(${state.x}px, ${state.y}px) rotate(${state.rotate}deg) scale(${state.scale})`;
        }

        // Compute a normalized/clamped state so the given image covers its frame.
        function normalizeAndClampStateForFrame(frame, img, stateIn) {
            if (!frame || !img || !img.naturalWidth) return stateIn;
            const id = frame.dataset.id;
            const type = id === 'main' ? 'main' : 'sub';
            let cropW = LOGIC_W[type];
            let cropH = LOGIC_H[type];
            if (type === 'sub') {
                const fw = parseFloat(frame.dataset.w);
                const fh = parseFloat(frame.dataset.h);
                if (!isNaN(fw) && !isNaN(fh)) { cropW = fw; cropH = fh; }
            }

            const imgW = img.naturalWidth;
            const imgH = img.naturalHeight;
            const r = (stateIn.rotate || 0) * Math.PI / 180;
            const cosR = Math.abs(Math.cos(r));
            const sinR = Math.abs(Math.sin(r));

            // min scale so the rotated AABB covers the crop rect
            const minScale = Math.max(
                cropW / (imgW * cosR + imgH * sinR),
                cropH / (imgW * sinR + imgH * cosR)
            );

            let s = Math.max(stateIn.scale || 1, minScale);
            // compute visual half extents
            const sw = imgW * s;
            const sh = imgH * s;
            const halfW = (sw * cosR + sh * sinR) / 2;
            const halfH = (sw * sinR + sh * cosR) / 2;

            // compute allowable center offsets in the pre-transform (translate) space
            const xMin = cropW - halfW - imgW / 2;
            const xMax = halfW - imgW / 2;
            const yMin = cropH - halfH - imgH / 2;
            const yMax = halfH - imgH / 2;

            let x = stateIn.x;
            let y = stateIn.y;
            if (isNaN(x)) x = 0;
            if (isNaN(y)) y = 0;
            x = Math.min(xMax, Math.max(xMin, x));
            y = Math.min(yMax, Math.max(yMin, y));

            return { x, y, scale: s, rotate: stateIn.rotate || 0 };
        }

        // 添加新的子相框
        function addFrame() {
            const area = document.getElementById('capture-area');
            const existing = area.querySelectorAll('.sub-slot-frame').length;
            const id = 'sub' + (existing + 1);

            const frame = document.createElement('div');
            frame.className = 'sub-slot-frame';
            frame.dataset.id = id;
            // stagger new frames so they don't all pile up
            frame.style.top = `${100 + existing * 10}px`;
            frame.style.left = `${100 + existing * 10}px`;
            frame.style.transform = 'rotate(0deg)';
            frame.style.zIndex = 10 + existing;

            // handlers for dragging and selecting
            frame.onmousedown = (e) => startFrameDrag(frame, e);
            frame.ontouchstart = (e) => startFrameDrag(frame, e);
            frame.onclick = (e) => selectSlot(frame, e);

            const container = document.createElement('div');
            container.className = 'sub-image-container';
            // set initial logical size
            container.style.width = LOGIC_W.sub + 'px';
            container.style.height = LOGIC_H.sub + 'px';
            const img = document.createElement('img');
            img.className = 'canvas-img';
            img.src = '';
            img.alt = '';
            container.appendChild(img);
            frame.appendChild(container);

            // store logical size on frame dataset
            frame.dataset.w = LOGIC_W.sub;
            frame.dataset.h = LOGIC_H.sub;

            // add resizer handle
            const r = document.createElement('div');
            r.className = 'resizer se';
            r.onmousedown = (e) => startResize(frame, e);
            r.ontouchstart = (e) => startResize(frame, e);
            frame.appendChild(r);

            area.appendChild(frame);
            selectSlot(frame);
        }

        function clearSlot() {
            if (!activeSlot) return;
            const id = activeSlot.dataset.id;
            const isMain = id === 'main';

            if (isMain) {
                // only clear the image for the main/background slot
                const img = activeSlot.querySelector('img.canvas-img');
                img.src = "";
                img.style.display = "none";

                const placeholder = activeSlot.querySelector('.placeholder');
                if (placeholder) placeholder.style.display = "flex";
            } else {
                // remove the entire sub‑slot frame from the DOM
                activeSlot.remove();
            }

            photoStates.delete(id);
            deselectAll({ target: document.querySelector('.canvas-viewport') });
        }

        // --- 相框旋转逻辑 (仅针对小相框) ---
        function rotateActiveFrame(delta = 5) {
            if (!activeSlot || activeSlot.dataset.id === 'main') return;
            // 获取当前旋转角度
            const style = window.getComputedStyle(activeSlot);
            const matrix = new DOMMatrixReadOnly(style.transform);
            let angle = Math.round(Math.atan2(matrix.b, matrix.a) * (180 / Math.PI));
            angle = angle + delta;
            activeSlot.style.transform = `rotate(${angle}deg)`;
        }

        // Natural dimensions of the image currently being cropped (set in openCropModal)
        let cropNaturalW = 0, cropNaturalH = 0;

        // --- 裁剪逻辑 ---
        function openCropModal() {
            if (!activeSlot) return;
            const id = activeSlot.dataset.id;
            if (!photoStates.has(id)) return triggerUpload();

            const state = photoStates.get(id);
            const img = activeSlot.querySelector('img.canvas-img');
            const type = id === 'main' ? 'main' : 'sub';

            // Store natural size from the already-loaded canvas image
            cropNaturalW = img.naturalWidth;
            cropNaturalH = img.naturalHeight;

            const preview = document.getElementById('cropPreviewImg');
            preview.src = img.src;
            
            const wrapper = document.getElementById('cropWrapper');
            // Use per-frame logical size for sub frames
            let w = LOGIC_W[type];
            let h = LOGIC_H[type];
            if (type === 'sub') {
                const fw = parseFloat(activeSlot.dataset.w);
                const fh = parseFloat(activeSlot.dataset.h);
                if (!isNaN(fw) && !isNaN(fh)) { w = fw; h = fh; }
            }
            wrapper.style.width = w + 'px';
            wrapper.style.height = h + 'px';

            // 视口适配：wrapper scales from top-left, sizer holds the visual footprint
            const screenW = window.innerWidth * 0.85;
            const screenH = window.innerHeight * 0.5;
            viewScale = Math.min(screenW / w, screenH / h);
            wrapper.style.transform = `scale(${viewScale})`;
            const sizer = document.getElementById('cropSizer');
            sizer.style.width = Math.round(w * viewScale) + 'px';
            sizer.style.height = Math.round(h * viewScale) + 'px';
            // Compensate border for wrapper scale so it always appears 1px visually
            document.getElementById('cropBox').style.borderWidth = (1 / viewScale).toFixed(2) + 'px';

            cropTemp = { ...state, isDragging: false };
            
            const zoomSlider = document.getElementById('cropZoom');
            const baseScale = Math.max(w / cropNaturalW, h / cropNaturalH);
            zoomSlider.min = (baseScale * 0.5).toFixed(4);
            zoomSlider.max = (baseScale * 5).toFixed(4);
            zoomSlider.value = cropTemp.scale;
            document.getElementById('cropRotate').value = cropTemp.rotate;

            updateCropTransform();
            document.getElementById('cropModal').style.display = 'flex';
        }

        function updateCropTransform() {
            const newScale = parseFloat(document.getElementById('cropZoom').value);
            const newRotate = parseInt(document.getElementById('cropRotate').value);
            cropTemp.scale = newScale;
            cropTemp.rotate = newRotate;

            clampCropPosition();

            const preview = document.getElementById('cropPreviewImg');
            preview.style.transform = `translate(${cropTemp.x}px, ${cropTemp.y}px) rotate(${cropTemp.rotate}deg) scale(${cropTemp.scale})`;

            document.getElementById('zoomLabel').innerText = newScale.toFixed(2) + 'x';
            document.getElementById('rotateLabel').innerText = newRotate + '°';
        }

        // Clamp photo position so it always fully covers the crop area.
        // Transform order: translate(x,y) rotate(r) scale(s), transform-origin: center center.
        // Rendered image center = (imgW/2 + x, imgH/2 + y).
        // AABB half-extents of rotated+scaled image must cover [0,cropW] x [0,cropH].
        function clampCropPosition() {
            if (!cropNaturalW || !activeSlot) return;

            const imgW = cropNaturalW;
            const imgH = cropNaturalH;
            const id = activeSlot.dataset.id;
            const type = id === 'main' ? 'main' : 'sub';
            // dynamic crop size for sub frames
            let cropW = LOGIC_W[type];
            let cropH = LOGIC_H[type];
            if (type === 'sub') {
                const fw = parseFloat(activeSlot.dataset.w);
                const fh = parseFloat(activeSlot.dataset.h);
                if (!isNaN(fw) && !isNaN(fh)) { cropW = fw; cropH = fh; }
            }

            const r = cropTemp.rotate * Math.PI / 180;
            const cosR = Math.abs(Math.cos(r));
            const sinR = Math.abs(Math.sin(r));

            // Minimum scale so AABB covers the crop rect at current rotation
            const minScale = Math.max(
                cropW / (imgW * cosR + imgH * sinR),
                cropH / (imgW * sinR + imgH * cosR)
            );

            if (cropTemp.scale < minScale) {
                cropTemp.scale = minScale;
                const slider = document.getElementById('cropZoom');
                if (parseFloat(slider.min) > minScale) slider.min = minScale.toFixed(4);
                slider.value = minScale;
                document.getElementById('zoomLabel').innerText = minScale.toFixed(2) + 'x';
            }

            const s = cropTemp.scale;
            const sw = imgW * s;
            const sh = imgH * s;
            const halfW = (sw * cosR + sh * sinR) / 2;
            const halfH = (sw * sinR + sh * cosR) / 2;

            const xMin = cropW - halfW - imgW / 2;
            const xMax = halfW - imgW / 2;
            const yMin = cropH - halfH - imgH / 2;
            const yMax = halfH - imgH / 2;

            cropTemp.x = Math.min(xMax, Math.max(xMin, cropTemp.x));
            cropTemp.y = Math.min(yMax, Math.max(yMin, cropTemp.y));
        }

        function applyCrop() {
            const id = activeSlot.dataset.id;
            const state = { x: cropTemp.x, y: cropTemp.y, scale: cropTemp.scale, rotate: cropTemp.rotate };
            photoStates.set(id, state);
            applyImgStyle(activeSlot.querySelector('img.canvas-img'), state);
            closeCropModal();
        }

        function closeCropModal() { document.getElementById('cropModal').style.display = 'none'; }

        // --- 拖拽事件管理器 ---
        
        // 1. 相框拖拽 (Frame Drag)
        function startFrameDrag(el, e) {
            // 如果点击的是图片，说明已经有图了，可能想换图或点选，先选中
            selectSlot(el, e);
            
            // 获取触摸点
            const point = e.touches ? e.touches[0] : e;
            frameDragState.isDragging = true;
            frameDragState.startX = point.clientX;
            frameDragState.startY = point.clientY;
            frameDragState.initialLeft = el.offsetLeft;
            frameDragState.initialTop = el.offsetTop;
        }

        // 3. 相框大小调整 (Resize)
        function startResize(frame, e) {
            // prevent selecting/moving when starting resize
            e.stopPropagation();
            const point = e.touches ? e.touches[0] : e;
            const container = frame.querySelector('.sub-image-container');
            resizeState.isResizing = true;
            resizeState.frame = frame;
            resizeState.startX = point.clientX;
            resizeState.startY = point.clientY;
            resizeState.initialW = container.clientWidth;
            resizeState.initialH = container.clientHeight;
            // ensure selected
            selectSlot(frame, e);
        }

        // 2. 裁剪图片拖拽 (Crop Image Drag)
        function startCropDrag(e) {
            const point = e.touches ? e.touches[0] : e;
            cropTemp.isDragging = true;
            cropTemp.lastX = point.clientX;
            cropTemp.lastY = point.clientY;
        }

        // 全局 Move
        function onGlobalMove(e) {
            const point = e.touches ? e.touches[0] : e;

            // 处理相框缩放
            if (resizeState.isResizing && resizeState.frame) {
                e.preventDefault();
                const scaler = document.getElementById('scaler');
                const canvasScale = parseFloat(window.getComputedStyle(scaler).transform.split(',')[3]) || 1;
                const dx = (point.clientX - resizeState.startX) / canvasScale;
                const dy = (point.clientY - resizeState.startY) / canvasScale;

                const newW = Math.max(40, Math.round(resizeState.initialW + dx));
                const newH = Math.max(30, Math.round(resizeState.initialH + dy));

                const container = resizeState.frame.querySelector('.sub-image-container');
                container.style.width = newW + 'px';
                container.style.height = newH + 'px';
                resizeState.frame.dataset.w = newW;
                resizeState.frame.dataset.h = newH;
                return;
            }

            // 处理裁剪图拖拽
            if (cropTemp.isDragging && document.getElementById('cropModal').style.display === 'flex') {
                e.preventDefault(); // 防止滚动
                const dx = point.clientX - cropTemp.lastX;
                const dy = point.clientY - cropTemp.lastY;
                
                cropTemp.x += dx / viewScale; // 修正视觉缩放带来的位移偏差
                cropTemp.y += dy / viewScale;
                
                cropTemp.lastX = point.clientX;
                cropTemp.lastY = point.clientY;
                
                const preview = document.getElementById('cropPreviewImg');
                preview.style.transform = `translate(${cropTemp.x}px, ${cropTemp.y}px) rotate(${cropTemp.rotate}deg) scale(${cropTemp.scale})`;
            }
            
            // 处理相框位置拖拽
            else if (frameDragState.isDragging && activeSlot && activeSlot.dataset.id !== 'main') {
                e.preventDefault();
                // 计算画布缩放比例
                const scaler = document.getElementById('scaler');
                const canvasScale = parseFloat(window.getComputedStyle(scaler).transform.split(',')[3]) || 1; // 简单的矩阵解析

                const dx = (point.clientX - frameDragState.startX) / canvasScale;
                const dy = (point.clientY - frameDragState.startY) / canvasScale;

                activeSlot.style.left = (frameDragState.initialLeft + dx) + 'px';
                activeSlot.style.top = (frameDragState.initialTop + dy) + 'px';
            }
        }

        // 全局 End
        function onGlobalEnd() {
            if (cropTemp.isDragging) {
                cropTemp.isDragging = false;
                clampCropPosition();
                // Animate snap-back if position was corrected
                const preview = document.getElementById('cropPreviewImg');
                preview.style.transition = 'transform 0.25s ease';
                preview.style.transform = `translate(${cropTemp.x}px, ${cropTemp.y}px) rotate(${cropTemp.rotate}deg) scale(${cropTemp.scale})`;
                setTimeout(() => { preview.style.transition = ''; }, 300);
            }
            cropTemp.isDragging = false;
            frameDragState.isDragging = false;
            // finish resizing
            if (resizeState.isResizing) {
                const frame = resizeState.frame;
                if (frame) {
                    const container = frame.querySelector('.sub-image-container');
                    const img = container ? container.querySelector('img.canvas-img') : null;
                    const id = frame.dataset.id;
                    if (img && img.src && img.naturalWidth) {
                        // take existing state and re-normalize against new size/rotate/scale
                        const existing = photoStates.get(id) || { x:0, y:0, scale:1, rotate:0 };
                        const state = normalizeAndClampStateForFrame(frame, img, existing);
                        photoStates.set(id, state);
                        // ensure image has explicit size still
                        img.style.width = img.naturalWidth + 'px';
                        img.style.height = img.naturalHeight + 'px';
                        img.style.display = 'block';
                        img.style.opacity = '1';
                        applyImgStyle(img, state);
                    }
                }
                resizeState.isResizing = false;
                resizeState.frame = null;
            }
        }

        // 绑定裁剪图的拖拽事件
        const cropImg = document.getElementById('cropPreviewImg');
        cropImg.addEventListener('mousedown', startCropDrag);
        cropImg.addEventListener('touchstart', startCropDrag, {passive: false});

        // 绑定全局移动和结束
        document.addEventListener('mousemove', onGlobalMove);
        document.addEventListener('touchmove', onGlobalMove, {passive: false});
        document.addEventListener('mouseup', onGlobalEnd);
        document.addEventListener('touchend', onGlobalEnd);

        // --- 导出逻辑 ---
        async function exportPhoto() {
            const loading = document.getElementById('exportLoading');
            const area = document.getElementById('capture-area');
            const qualityScale = parseFloat(document.getElementById('exportQuality').value);
            
            loading.style.display = 'flex';
            
            // 临时移除选中框状态，避免截图进去
            const prevActive = activeSlot;
            if (activeSlot) activeSlot.classList.remove('active');

            // 稍微延迟让UI渲染Loading
            setTimeout(async () => {
                try {
                    // 确保截图时 scale 为 1，防止偏移
                    const scaler = document.getElementById('scaler');
                    const originalTransform = scaler.style.transform;
                    const originalMargin = scaler.style.marginBottom;
                    scaler.style.transform = 'scale(1)';
                    scaler.style.marginBottom = '0';

                    const canvas = await html2canvas(area, {
                        scale: qualityScale,
                        useCORS: true,
                        logging: false,
                        backgroundColor: '#ffffff'
                    });

                    // 恢复视图
                    scaler.style.transform = originalTransform;
                    scaler.style.marginBottom = originalMargin;

                    // 下载
                    const link = document.createElement('a');
                    const dpiInfo = qualityScale === 2 ? 'HD' : (qualityScale === 3 ? 'UHD' : 'Preview');
                    link.download = `Photo_6Grid_${dpiInfo}_${Date.now()}.jpg`;
                    link.href = canvas.toDataURL('image/jpeg', 0.92);
                    link.click();

                } catch (err) {
                    console.error(err);
                    alert("导出失败，内存不足或图片过大");
                } finally {
                    if (prevActive) prevActive.classList.add('active');
                    loading.style.display = 'none';
                }
            }, 100);
        }
    </script>
