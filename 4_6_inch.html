<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4x6寸竖版照片排版工具 (精修整齐版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .canvas-viewport {
            width: 100%;
            overflow: auto;
            display: flex;
            justify-content: center;
            padding: 40px 0;
            background: #f8fafc;
        }
        /* 竖版画布：600x900 */
        .photo-canvas {
            width: 600px;
            height: 900px;
            min-width: 600px;
            min-height: 900px;
            background: #fff;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        .main-slot {
            position: absolute;
            top: 0; left: 0; width: 600px; height: 900px;
            overflow: hidden; background: #f1f5f9;
            cursor: pointer;
        }
        .main-slot.active { outline: 4px solid #3b82f6; z-index: 5; }
        
        .sub-slot-frame {
            position: absolute;
            background: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.12);
            z-index: 10;
            cursor: move;
            padding: 2px;
            transition: outline 0.2s, z-index 0s;
            touch-action: none; 
        }
        .sub-slot-frame.active { outline: 4px solid #3b82f6; z-index: 100 !important; }

        /* 宽度缩小 5px 至 175px */
        .sub-image-container {
            width: 175px;
            height: 120px;
            overflow: hidden;
            background: #e2e8f0;
            position: relative;
        }

        .slot img {
            position: absolute;
            top: 0; left: 0;
            transform-origin: center center; 
            pointer-events: none;
            display: none;
            will-change: transform;
            max-width: none !important;
            max-height: none !important;
        }

        .slot-label {
            color: #94a3b8; font-size: 14px; pointer-events: none;
            position: absolute; width: 100%; text-align: center;
            top: 50%; transform: translateY(-50%);
        }

        .crop-modal {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: none;
            flex-direction: column;
        }
        .crop-viewport {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }
        #cropWrapper {
            position: relative;
            transform-origin: center center;
        }
        #cropBox {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 2px solid #fff;
            box-shadow: 0 0 0 5000px rgba(0,0,0,0.85);
            z-index: 20;
            pointer-events: none; 
        }
        #cropPreviewImg {
            position: absolute;
            top: 0; left: 0;
            transform-origin: center center;
            z-index: 10;
            cursor: move;
            will-change: transform;
            pointer-events: auto;
            max-width: none !important;
            max-height: none !important;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="pt-8 pb-4 text-center">
        <h1 class="text-2xl font-bold text-slate-800">高清照片排版工具 (精修整齐版)</h1>
        <p class="text-slate-500 text-sm">宽度减小并微调对齐，更显精致</p>
    </div>

    <div class="canvas-viewport" onclick="deselectAll(event)">
        <div id="capture-area" class="photo-canvas">
            <div class="main-slot slot" data-id="main" onclick="selectSlot(this, 'main', event)">
                <span class="slot-label">点击上传背景 (600x900)</span>
            </div>

            <!-- 第一排：精修对齐 -->
            <div class="sub-slot-frame slot" style="top: 565px; left: 30px; transform: rotate(-2deg); z-index: 11;" data-id="sub1" onclick="selectSlot(this, 'sub1', event)">
                <div class="sub-image-container"></div>
            </div>
            <div class="sub-slot-frame slot" style="top: 560px; left: 210px; transform: rotate(1deg); z-index: 12;" data-id="sub2" onclick="selectSlot(this, 'sub2', event)">
                <div class="sub-image-container"></div>
            </div>
            <div class="sub-slot-frame slot" style="top: 565px; left: 390px; transform: rotate(-1.5deg); z-index: 13;" data-id="sub3" onclick="selectSlot(this, 'sub3', event)">
                <div class="sub-image-container"></div>
            </div>

            <!-- 第二排：精修对齐 -->
            <div class="sub-slot-frame slot" style="top: 725px; left: 35px; transform: rotate(2deg); z-index: 14;" data-id="sub4" onclick="selectSlot(this, 'sub4', event)">
                <div class="sub-image-container"></div>
            </div>
            <div class="sub-slot-frame slot" style="top: 720px; left: 215px; transform: rotate(-1.5deg); z-index: 15;" data-id="sub5" onclick="selectSlot(this, 'sub5', event)">
                <div class="sub-image-container"></div>
            </div>
            <div class="sub-slot-frame slot" style="top: 725px; left: 395px; transform: rotate(1.5deg); z-index: 16;" data-id="sub6" onclick="selectSlot(this, 'sub6', event)">
                <div class="sub-image-container"></div>
            </div>
        </div>
    </div>

    <!-- 底部控制栏 -->
    <div id="toolbar" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur px-8 py-4 rounded-full shadow-2xl flex gap-6 items-center opacity-0 pointer-events-none transition-all z-50">
        <button onclick="triggerUpload()" class="flex flex-col items-center group">
            <div class="p-2 bg-slate-100 group-hover:bg-blue-100 rounded-lg transition"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></div>
            <span class="text-[10px] mt-1 font-bold text-slate-600">更换图片</span>
        </button>
        
        <button onclick="openCropModal()" class="flex flex-col items-center group">
            <div class="p-2 bg-slate-100 group-hover:bg-blue-100 rounded-lg transition"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 3v15M18 6v15M3 6h15M6 18h15"/></svg></div>
            <span class="text-[10px] mt-1 font-bold text-slate-600">内部裁剪</span>
        </button>

        <div id="frameRotateBtn" class="flex flex-col items-center group cursor-pointer" onclick="rotateActiveFrame()">
            <div class="p-2 bg-slate-100 group-hover:bg-blue-100 rounded-lg transition"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg></div>
            <span class="text-[10px] mt-1 font-bold text-slate-600">旋转相框</span>
        </div>

        <div class="h-8 w-px bg-slate-200"></div>
        
        <button onclick="exportPhoto()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full font-bold text-sm transition">导出成品图</button>
    </div>

    <!-- 裁剪窗口 -->
    <div id="cropModal" class="crop-modal">
        <div class="p-4 flex justify-between items-center border-b border-white/10">
            <button onclick="closeCropModal()" class="text-white/70 px-4 py-2">取消</button>
            <span class="text-white font-bold">裁剪图片</span>
            <button onclick="applyCrop()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold">保存</button>
        </div>
        <div class="crop-viewport" id="cropViewport">
            <div id="cropWrapper">
                <img id="cropPreviewImg" src="" draggable="false">
                <div id="cropBox"></div>
            </div>
        </div>
        <div class="p-6 bg-zinc-900 space-y-6">
            <div class="max-w-md mx-auto space-y-4">
                <div class="flex justify-between text-xs text-zinc-400"><span>缩放</span><span id="zoomLabel" class="text-blue-400">1.00x</span></div>
                <input type="range" id="cropZoom" min="0.01" max="5" step="0.001" oninput="updateCropTransform()" class="w-full h-2 bg-zinc-700 rounded-lg appearance-none cursor-pointer">
                <div class="flex justify-between text-xs text-zinc-400"><span>旋转</span><span id="rotateLabel" class="text-blue-400">0°</span></div>
                <input type="range" id="cropRotate" min="-180" max="180" step="1" oninput="updateCropTransform()" class="w-full h-2 bg-zinc-700 rounded-lg appearance-none cursor-pointer">
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleFile(event)">

    <script>
        let activeSlot = null;
        const photoStates = new Map();
        let frameDragging = false, startX, startY, fLeft, fTop, activeFrame;

        let cropTemp = { x: 0, y: 0, scale: 1, rotate: 0, lastX: 0, lastY: 0, isDragging: false };
        let currentViewportScale = 1;

        const LOGIC_W = { main: 600, sub: 175 }; // 缩小 5px
        const LOGIC_H = { main: 900, sub: 120 };

        function selectSlot(slot, id, e) {
            if (e) e.stopPropagation();
            if (activeSlot) activeSlot.classList.remove('active');
            activeSlot = slot;
            activeSlot.classList.add('active');
            const tb = document.getElementById('toolbar');
            tb.style.opacity = "1";
            tb.style.pointerEvents = "auto";
            tb.style.transform = "translate(-50%, 0)";
            document.getElementById('frameRotateBtn').style.display = (id === 'main') ? 'none' : 'flex';
        }

        function deselectAll(e) {
            if (e.target.id === 'capture-area' || e.target.classList.contains('canvas-viewport')) {
                if (activeSlot) activeSlot.classList.remove('active');
                activeSlot = null;
                const tb = document.getElementById('toolbar');
                tb.style.opacity = "0";
                tb.style.pointerEvents = "none";
                tb.style.transform = "translate(-50%, 20px)";
            }
        }

        function rotateActiveFrame() {
            if (!activeSlot || activeSlot.dataset.id === 'main') return;
            const style = window.getComputedStyle(activeSlot);
            const matrix = new DOMMatrixReadOnly(style.transform);
            let currentAngle = Math.round(Math.atan2(matrix.b, matrix.a) * (180 / Math.PI));
            activeSlot.style.transform = `rotate(${currentAngle + 5}deg)`;
        }

        function triggerUpload() { document.getElementById('fileInput').click(); }

        function handleFile(event) {
            const file = event.target.files[0];
            if (!file || !activeSlot) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const id = activeSlot.dataset.id;
                const type = id === 'main' ? 'main' : 'sub';
                const container = activeSlot.querySelector('.sub-image-container') || activeSlot;
                let img = container.querySelector('img');
                if (!img) {
                    img = document.createElement('img');
                    container.appendChild(img);
                }
                img.src = e.target.result;
                img.onload = () => {
                    img.width = img.naturalWidth; img.height = img.naturalHeight;
                    img.style.display = 'block';
                    const fitScale = Math.max(LOGIC_W[type] / img.naturalWidth, LOGIC_H[type] / img.naturalHeight);
                    const state = { x: (LOGIC_W[type] - img.naturalWidth) / 2, y: (LOGIC_H[type] - img.naturalHeight) / 2, scale: fitScale, rotate: 0 };
                    photoStates.set(id, state);
                    renderImg(img, state);
                };
            };
            reader.readAsDataURL(file);
            event.target.value = '';
        }

        function renderImg(img, state) {
            img.style.transform = `translate(${state.x}px, ${state.y}px) scale(${state.scale}) rotate(${state.rotate}deg)`;
        }

        function openCropModal() {
            if (!activeSlot) return;
            const img = activeSlot.querySelector('img');
            if (!img) return;
            const id = activeSlot.dataset.id, type = id === 'main' ? 'main' : 'sub';
            const state = photoStates.get(id);
            const modal = document.getElementById('cropModal'), preview = document.getElementById('cropPreviewImg'), wrapper = document.getElementById('cropWrapper');
            preview.src = img.src; preview.width = img.naturalWidth; preview.height = img.naturalHeight;
            wrapper.style.width = LOGIC_W[type] + 'px'; wrapper.style.height = LOGIC_H[type] + 'px';
            currentViewportScale = Math.min((window.innerWidth * 0.8) / LOGIC_W[type], (window.innerHeight * 0.5) / LOGIC_H[type]);
            wrapper.style.transform = `scale(${currentViewportScale})`;
            cropTemp = { ...state, isDragging: false };
            const fitScale = Math.max(LOGIC_W[type] / img.naturalWidth, LOGIC_H[type] / img.naturalHeight);
            const zs = document.getElementById('cropZoom'); zs.min = fitScale * 0.1; zs.max = fitScale * 10; zs.value = cropTemp.scale;
            document.getElementById('cropRotate').value = cropTemp.rotate;
            updateCropTransform();
            modal.style.display = 'flex';
        }

        function updateCropTransform() {
            cropTemp.scale = parseFloat(document.getElementById('cropZoom').value);
            cropTemp.rotate = parseInt(document.getElementById('cropRotate').value);
            const preview = document.getElementById('cropPreviewImg'), type = activeSlot.dataset.id === 'main' ? 'main' : 'sub';
            const fitScale = Math.max(LOGIC_W[type] / preview.naturalWidth, LOGIC_H[type] / preview.naturalHeight);
            document.getElementById('zoomLabel').innerText = (cropTemp.scale / fitScale).toFixed(2) + 'x';
            document.getElementById('rotateLabel').innerText = cropTemp.rotate + '°';
            renderImg(preview, cropTemp);
        }

        function applyCrop() {
            const id = activeSlot.dataset.id;
            const state = { x: cropTemp.x, y: cropTemp.y, scale: cropTemp.scale, rotate: cropTemp.rotate };
            photoStates.set(id, state);
            renderImg(activeSlot.querySelector('img'), state);
            closeCropModal();
        }

        function closeCropModal() { document.getElementById('cropModal').style.display = 'none'; }

        function startDrag(clientX, clientY, target) {
            if (target.id === 'cropPreviewImg') {
                cropTemp.isDragging = true;
                cropTemp.lastX = clientX;
                cropTemp.lastY = clientY;
            } else {
                const frame = target.closest('.sub-slot-frame');
                if (frame && document.getElementById('cropModal').style.display !== 'flex') {
                    activeFrame = frame;
                    frameDragging = true;
                    startX = clientX; startY = clientY;
                    fLeft = frame.offsetLeft; fTop = frame.offsetTop;
                    selectSlot(frame, frame.dataset.id);
                }
            }
        }

        function moveDrag(clientX, clientY) {
            if (cropTemp.isDragging) {
                cropTemp.x += (clientX - cropTemp.lastX) / currentViewportScale;
                cropTemp.y += (clientY - cropTemp.lastY) / currentViewportScale;
                cropTemp.lastX = clientX;
                cropTemp.lastY = clientY;
                updateCropTransform();
            }
            if (frameDragging && activeFrame) {
                activeFrame.style.left = (fLeft + clientX - startX) + 'px';
                activeFrame.style.top = (fTop + clientY - startY) + 'px';
            }
        }

        function stopDrag() {
            cropTemp.isDragging = false;
            frameDragging = false;
        }

        document.addEventListener('mousedown', (e) => startDrag(e.clientX, e.clientY, e.target));
        document.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));
        document.addEventListener('mouseup', stopDrag);

        document.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            startDrag(touch.clientX, touch.clientY, e.target);
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            if (cropTemp.isDragging || frameDragging) {
                e.preventDefault();
                const touch = e.touches[0];
                moveDrag(touch.clientX, touch.clientY);
            }
        }, { passive: false });

        document.addEventListener('touchend', stopDrag);

        async function exportPhoto() {
            const area = document.getElementById('capture-area');
            const prevActive = activeSlot;
            if (activeSlot) activeSlot.classList.remove('active');
            try {
                const canvas = await html2canvas(area, { scale: 3, useCORS: true, backgroundColor: '#ffffff' });
                const link = document.createElement('a');
                link.download = `Photo_Portrait_Layout_6_${Date.now()}.jpg`;
                link.href = canvas.toDataURL('image/jpeg', 0.95);
                link.click();
            } catch (err) { alert("导出失败"); }
            finally { if (prevActive) prevActive.classList.add('active'); }
        }
    </script>
</body>
</html>
