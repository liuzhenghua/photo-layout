<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寻马日记(反面) - 刘宸玮</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        :root {
            --journal-bg: #faf6ea;
            --accent-color: #d4a373;
            --text-hand: 'ZCOOL KuaiLe', cursive;
            --text-standard: 'STKaiti', 'KaiTi', serif;
        }

        body {
            background-color: #e5e5e5;
            background-color: none;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .a4-page {
            width: 210mm;
            height: 297mm;
            background-color: var(--journal-bg);
            box-shadow: 0 0 30px rgba(0,0,0,0.15);
            position: relative;
            padding: 40px;
            box-sizing: border-box;
            overflow: hidden;
            border: 12px solid #fff;
        }

        .grid-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(#d4a373 0.5px, transparent 0.5px);
            background-size: 25px 25px;
            opacity: 0.15;
            pointer-events: none;
        }

        /* 模块通用样式 */
        .section-box {
            border: 3px solid #faedcd;
            background: #fff;
            border-radius: 15px;
            position: relative;
            margin-bottom: 25px;
            padding: 15px;
        }

        .section-title {
            font-family: var(--text-hand);
            font-size: 28px;
            color: #8b5e3c;
            position: absolute;
            top: -20px;
            left: 20px;
            background: #fffdf5;
            padding: 0 10px;
        }

        /* 路线图区域 */
        .map-area {
            height: 420px;
            border: 2px dashed #d4a373;
            background: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
            font-family: var(--text-hand);
            font-size: 20px;
        }

        /* 小档案区域 */
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            font-family: var(--text-hand);
            font-size: 22px;
            color: #6d6875;
        }

        .profile-item {
            border-bottom: 2px solid #faedcd;
            padding: 5px 0;
        }

        /* 记录区域：改为小草背景行线 */
        .writing-lines {
            line-height: 40px;
            /* 使用 SVG 绘制的小草图案背景 */
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='40' viewBox='0 0 100 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 40 Q12 30 15 40 M15 40 Q18 25 22 40 M50 40 Q52 35 55 40 M80 40 Q83 30 87 40' stroke='%23a7c957' stroke-width='1.5' fill='none'/%3E%3Cline x1='0' y1='39' x2='100' y2='39' stroke='%23faedcd' stroke-width='1'/%3E%3C/svg%3E");
            background-size: 100px 40px;
            min-height: 320px;
            font-family: var(--text-hand);
            font-size: 22px;
            color: #555;
            padding-top: 10px;
        }

        /* 装饰元素 */
        .stamp {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 4px double #e07a5f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e07a5f;
            font-family: var(--text-hand);
            font-size: 18px;
            font-weight: bold;
            transform: rotate(20deg);
            opacity: 0.7;
        }

        .bottom-decoration {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="a4-page">
        <div class="grid-overlay"></div>

        <!-- 顶部装饰 -->
        <div style="font-family: var(--text-hand); font-size: 40px; color: #8b5e3c; text-align: center; margin-bottom: 30px;">
            🐎 我的寻马足迹 🐎
        </div>

        <!-- 1. 寻马路线图 -->
        <div class="section-box">
            <span class="section-title">🗺️ 寻马路线图</span>
            <div class="map-area">
                ( 小朋友，在这里画出你寻找马儿的路线吧！ )
            </div>
            <div style="position: absolute; right: 20px; bottom: 10px; font-size: 30px;">🚩</div>
        </div>

        <!-- 3. 心情日记 -->
        <div class="section-box" style="margin-top: 45px;">
            <span class="section-title">✏️ 寻马小记</span>
            <div class="writing-lines">
                今天，我和爸爸妈妈一起去看马儿。我有一点点害怕，没有上前喂它，只是在旁边悄悄观察它。我发现马儿__________，它的眼睛__________，身体__________。虽然我没有靠近，但我觉得今天真是____________________的一天！
            </div>
            <!-- 小插图装饰 -->
            <div style="position: absolute; right: 30px; bottom: 30px; font-size: 50px;">🐴</div>
        </div>

        <!-- 4. 自评章 -->
        <div class="stamp" style="bottom: 80px; right: 60px;">
            棒棒哒！
        </div>

        <!-- 底部装饰 -->
        <div class="bottom-decoration">
            <div style="font-size: 28px;">✨ ☀️ 🌈 🍀 🍎 🥕 ✨</div>
        </div>

    </div>

</body>
</html>
