<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>6寸横版双拍立得</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Ma+Shan+Zheng&family=Pacifico&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root {
            --canvas-w: 900px;
            --canvas-h: 600px;
        }

        body {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }

        .canvas-viewport {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            background: #f8fafc;
            min-height: calc(100vh - 190px);
        }

        .canvas-scaler {
            transform-origin: center center;
            transition: transform 0.2s ease;
        }

        .photo-canvas {
            width: var(--canvas-w);
            height: var(--canvas-h);
            position: relative;
            overflow: hidden;
            background: #ffffff;
        }

        .polaroid {
            position: absolute;
            width: 360px;
            height: 490px;
            background: #fff;
            border-radius: 0;
            box-shadow: none;
            padding: 14px 14px 90px 14px;
            cursor: pointer;
            user-select: none;
        }

        .polaroid.active {
            box-shadow: inset 0 0 0 4px #3b82f6;
        }

        .photo-area {
            width: 100%;
            height: 100%;
            background: #f1f5f9;
            overflow: hidden;
            position: relative;
        }

        .photo-area img {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: center center;
            max-width: none !important;
            max-height: none !important;
            display: none;
            pointer-events: none;
        }

        .placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            border: 1px dashed #cbd5e1;
            font-size: 12px;
            font-weight: 700;
        }

        .caption {
            position: absolute;
            left: 20px;
            right: 20px;
            bottom: 22px;
            text-align: center;
            color: #334155;
            font-size: 30px;
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
        }

        .crop-modal {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: none;
            flex-direction: column;
        }

        #cropWrapper {
            position: relative;
            transform-origin: center center;
            background: #111;
            overflow: hidden;
            flex-shrink: 0;
        }

        #cropPreviewImg {
            position: absolute;
            top: 0;
            left: 0;
            cursor: move;
            touch-action: none;
            transform-origin: center center;
            max-width: none !important;
            max-height: none !important;
        }

        #cropBox {
            position: absolute;
            inset: 0;
            border: 2px solid #3b82f6;
            box-shadow: 0 0 0 5000px rgba(0, 0, 0, 0.8);
            z-index: 20;
            pointer-events: none;
        }

        #exportLoading {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.8);
            z-index: 2000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #3b82f6;
            margin-top: -8px;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
    <header class="bg-white/90 backdrop-blur sticky top-0 z-40 px-4 py-3 flex justify-between items-center border-b border-slate-200">
        <div>
            <h1 class="text-sm font-bold text-slate-800">6寸横版双拍立得</h1>
            <div class="flex items-center gap-2 mt-0.5">
                <span class="text-[10px] text-slate-400">900 x 600 画布</span>
                <select id="exportQuality" class="text-[10px] bg-slate-100 border-none rounded px-1 py-0.5 font-bold text-blue-600 focus:ring-0">
                    <option value="1">预览 (900x600)</option>
                    <option value="2">高清 (1800x1200 / 300DPI)</option>
                    <option value="3" selected>超清 (2700x1800 / 450DPI)</option>
                </select>
            </div>
        </div>
        <button onclick="exportPhoto()" class="bg-blue-600 text-white px-4 py-1.5 rounded-full text-xs font-bold shadow-md active:scale-95 transition">导出</button>
    </header>

    <main class="flex-1 canvas-viewport">
        <div id="scaler" class="canvas-scaler">
            <div id="captureArea" class="photo-canvas">
                <div id="card1" class="polaroid" style="left: 68px; top: 55px; transform: rotate(0deg);" onclick="selectCard(1)">
                    <div class="photo-area">
                        <div class="placeholder">点击上传第1张</div>
                        <img alt="photo-1">
                    </div>
                    <div id="caption1" class="caption"></div>
                </div>
                <div id="card2" class="polaroid" style="left: 472px; top: 55px; transform: rotate(0deg);" onclick="selectCard(2)">
                    <div class="photo-area">
                        <div class="placeholder">点击上传第2张</div>
                        <img alt="photo-2">
                    </div>
                    <div id="caption2" class="caption"></div>
                </div>
            </div>
        </div>
    </main>

    <section class="bg-white border-t border-slate-200 p-3">
        <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-2">
            <div class="flex items-center gap-2">
                <button onclick="uploadPhoto(1)" class="px-3 py-2 text-xs rounded-lg bg-blue-50 text-blue-700 font-bold">选第1张</button>
                <button onclick="openCropModal(1)" class="px-3 py-2 text-xs rounded-lg bg-slate-100 text-slate-700 font-bold">裁剪1</button>
                <input id="text1" type="text" class="flex-1 text-xs border border-slate-300 rounded-lg px-2 py-2" placeholder="第1张文案" oninput="updateCaption(1)">
            </div>
            <div class="flex items-center gap-2">
                <button onclick="uploadPhoto(2)" class="px-3 py-2 text-xs rounded-lg bg-blue-50 text-blue-700 font-bold">选第2张</button>
                <button onclick="openCropModal(2)" class="px-3 py-2 text-xs rounded-lg bg-slate-100 text-slate-700 font-bold">裁剪2</button>
                <input id="text2" type="text" class="flex-1 text-xs border border-slate-300 rounded-lg px-2 py-2" placeholder="第2张文案" oninput="updateCaption(2)">
            </div>
        </div>
        <div class="max-w-4xl mx-auto mt-2 flex flex-wrap gap-2 items-center">
            <button onclick="randomizeTexts()" class="px-3 py-2 text-xs rounded-lg bg-slate-100 text-slate-700 font-bold">随机文案</button>
            <label class="text-xs text-slate-500 font-bold">字体</label>
            <select id="fontSelect" onchange="applyFont()" class="text-xs border border-slate-300 rounded-lg px-2 py-2 bg-white">
                <option value="'Ma Shan Zheng', cursive">马善政</option>
                <option value="'ZCOOL KuaiLe', cursive">站酷快乐体</option>
                <option value="'Caveat', cursive">Caveat</option>
                <option value="'Pacifico', cursive">Pacifico</option>
                <option value="'Comic Sans MS', 'Marker Felt', cursive">Handwritten</option>
            </select>
        </div>
    </section>

    <div id="cropModal" class="crop-modal">
        <div class="p-4 flex justify-between items-center bg-black/80 backdrop-blur">
            <button onclick="closeCropModal()" class="text-white/40 text-sm px-2">取消</button>
            <span class="text-white text-xs font-bold tracking-widest uppercase">裁剪照片</span>
            <button onclick="applyCrop()" class="bg-blue-600 text-white px-5 py-2 rounded-full text-xs font-bold">保存</button>
        </div>
        <div class="flex-1 flex items-center justify-center overflow-hidden p-4" id="cropViewport">
            <div id="cropWrapper">
                <img id="cropPreviewImg" src="" draggable="false">
                <div id="cropBox"></div>
            </div>
        </div>
        <div class="p-8 bg-zinc-950">
            <div class="max-w-xs mx-auto space-y-8">
                <div>
                    <div class="flex justify-between text-[10px] text-zinc-500 font-black mb-3"><span>缩放</span><span id="zoomLabel" class="text-blue-500">1.0X</span></div>
                    <input type="range" id="cropZoom" min="0.1" max="3" step="0.01" oninput="updateCropTransform()" class="w-full">
                </div>
                <div>
                    <div class="flex justify-between text-[10px] text-zinc-500 font-black mb-3"><span>旋转</span><span id="rotateLabel" class="text-blue-500">0°</span></div>
                    <input type="range" id="cropRotate" min="-180" max="180" step="1" oninput="updateCropTransform()" class="w-full">
                </div>
            </div>
        </div>
    </div>

    <div id="exportLoading">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-blue-500 border-t-transparent mb-4"></div>
        <p class="text-sm font-medium">正在生成图片...</p>
    </div>

    <input id="file1" type="file" accept="image/*" class="hidden" onchange="handleFile(1, event)">
    <input id="file2" type="file" accept="image/*" class="hidden" onchange="handleFile(2, event)">

    <script>
        const FRAME_W = 332;
        const FRAME_H = 386;
        const textPool = ["今日份快乐", "周末散步", "天晴有风", "你在身边", "生活是礼物", "路过好风景", "记录这一刻", "小确幸"];
        const photoStates = new Map();
        let activeCard = 1;
        let cropCardId = null;
        let cropNaturalW = 0;
        let cropNaturalH = 0;
        let viewScale = 1;
        let cropTemp = { x: 0, y: 0, scale: 1, rotate: 0, lastX: 0, lastY: 0, isDragging: false };

        function autoScaleCanvas() {
            const viewport = document.querySelector('.canvas-viewport');
            const scaler = document.getElementById('scaler');
            const area = document.getElementById('captureArea');
            const scale = Math.min((viewport.clientWidth - 20) / area.offsetWidth, 1);
            scaler.style.transform = `scale(${scale})`;
        }

        function pickRandomText() {
            return textPool[Math.floor(Math.random() * textPool.length)];
        }

        function randomizeTexts() {
            document.getElementById('text1').value = pickRandomText();
            document.getElementById('text2').value = pickRandomText();
            updateCaption(1);
            updateCaption(2);
        }

        function selectCard(id) {
            activeCard = id;
            document.getElementById('card1').classList.toggle('active', id === 1);
            document.getElementById('card2').classList.toggle('active', id === 2);
            const card = document.getElementById(`card${id}`);
            const hasImage = !!card.querySelector('img').getAttribute('src');
            if (!hasImage) uploadPhoto(id);
        }

        function uploadPhoto(id) {
            document.getElementById(`file${id}`).value = '';
            document.getElementById(`file${id}`).click();
        }

        function applyImageState(id) {
            const card = document.getElementById(`card${id}`);
            const img = card.querySelector('img');
            const state = photoStates.get(id);
            if (!state) return;
            img.style.transform = `translate(${state.x}px, ${state.y}px) rotate(${state.rotate}deg) scale(${state.scale})`;
        }

        function handleFile(id, event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const card = document.getElementById(`card${id}`);
                const img = card.querySelector('img');
                const placeholder = card.querySelector('.placeholder');
                img.src = e.target.result;
                img.style.display = 'block';
                placeholder.style.display = 'none';
                img.onload = () => {
                    const fitScale = Math.max(FRAME_W / img.naturalWidth, FRAME_H / img.naturalHeight);
                    photoStates.set(id, {
                        x: (FRAME_W - img.naturalWidth) / 2,
                        y: (FRAME_H - img.naturalHeight) / 2,
                        scale: fitScale,
                        rotate: 0
                    });
                    applyImageState(id);
                    selectCard(id);
                };
            };
            reader.readAsDataURL(file);
        }

        function updateCaption(id) {
            const value = document.getElementById(`text${id}`).value.trim();
            document.getElementById(`caption${id}`).innerText = value || ' ';
        }

        function applyFont() {
            const font = document.getElementById('fontSelect').value;
            document.getElementById('caption1').style.fontFamily = font;
            document.getElementById('caption2').style.fontFamily = font;
        }

        function recalcCropViewScale() {
            const viewport = document.getElementById('cropViewport');
            const wrapper = document.getElementById('cropWrapper');
            const rect = viewport.getBoundingClientRect();
            const vw = Math.max(rect.width - 24, 240);
            const vh = Math.max(rect.height - 24, 180);
            viewScale = Math.min(vw / FRAME_W, vh / FRAME_H, 1);
            wrapper.style.width = `${FRAME_W}px`;
            wrapper.style.height = `${FRAME_H}px`;
            wrapper.style.transform = `scale(${viewScale})`;
        }

        function renderCropPreview() {
            const preview = document.getElementById('cropPreviewImg');
            preview.style.transform = `translate(${cropTemp.x}px, ${cropTemp.y}px) rotate(${cropTemp.rotate}deg) scale(${cropTemp.scale})`;
        }

        function openCropModal(id) {
            const cardId = id || activeCard;
            const card = document.getElementById(`card${cardId}`);
            const img = card.querySelector('img');
            if (!img.getAttribute('src')) return uploadPhoto(cardId);
            cropCardId = cardId;
            cropNaturalW = img.naturalWidth;
            cropNaturalH = img.naturalHeight;
            cropTemp = { ...photoStates.get(cardId), isDragging: false, lastX: 0, lastY: 0 };
            const zoom = document.getElementById('cropZoom');
            zoom.min = (cropTemp.scale * 0.1).toFixed(4);
            zoom.max = (cropTemp.scale * 10).toFixed(4);
            zoom.value = cropTemp.scale;
            document.getElementById('cropRotate').value = cropTemp.rotate || 0;
            document.getElementById('cropPreviewImg').src = img.src;
            document.getElementById('cropModal').style.display = 'flex';
            requestAnimationFrame(() => {
                recalcCropViewScale();
                updateCropTransform();
            });
        }

        function closeCropModal() {
            document.getElementById('cropModal').style.display = 'none';
        }

        function clampCropPosition() {
            if (!cropNaturalW || !cropCardId) return;
            const r = cropTemp.rotate * Math.PI / 180;
            const cosR = Math.abs(Math.cos(r));
            const sinR = Math.abs(Math.sin(r));
            const minScale = Math.max(
                FRAME_W / (cropNaturalW * cosR + cropNaturalH * sinR),
                FRAME_H / (cropNaturalW * sinR + cropNaturalH * cosR)
            );
            if (cropTemp.scale < minScale) {
                cropTemp.scale = minScale;
                const slider = document.getElementById('cropZoom');
                if (parseFloat(slider.min) > minScale) slider.min = minScale.toFixed(4);
                slider.value = minScale;
            }
            const s = cropTemp.scale;
            const sw = cropNaturalW * s;
            const sh = cropNaturalH * s;
            const halfW = (sw * cosR + sh * sinR) / 2;
            const halfH = (sw * sinR + sh * cosR) / 2;
            const xMin = FRAME_W - halfW - cropNaturalW / 2;
            const xMax = halfW - cropNaturalW / 2;
            const yMin = FRAME_H - halfH - cropNaturalH / 2;
            const yMax = halfH - cropNaturalH / 2;
            cropTemp.x = Math.min(xMax, Math.max(xMin, cropTemp.x));
            cropTemp.y = Math.min(yMax, Math.max(yMin, cropTemp.y));
        }

        function updateCropTransform() {
            const newScale = parseFloat(document.getElementById('cropZoom').value);
            const oldScale = cropTemp.scale;
            const newRotate = parseInt(document.getElementById('cropRotate').value, 10) || 0;
            if (oldScale !== newScale) {
                const cx = FRAME_W / 2;
                const cy = FRAME_H / 2;
                const imgCx = cropTemp.x + cropNaturalW / 2;
                const imgCy = cropTemp.y + cropNaturalH / 2;
                cropTemp.x += (cx - imgCx) * (1 - newScale / oldScale);
                cropTemp.y += (cy - imgCy) * (1 - newScale / oldScale);
                cropTemp.scale = newScale;
            }
            cropTemp.rotate = newRotate;
            clampCropPosition();
            const baseScale = photoStates.get(cropCardId)?.scale || 1;
            document.getElementById('zoomLabel').innerText = (cropTemp.scale / baseScale).toFixed(1) + 'X';
            document.getElementById('rotateLabel').innerText = cropTemp.rotate + '°';
            renderCropPreview();
        }

        function applyCrop() {
            if (!cropCardId) return;
            photoStates.set(cropCardId, { x: cropTemp.x, y: cropTemp.y, scale: cropTemp.scale, rotate: cropTemp.rotate });
            applyImageState(cropCardId);
            closeCropModal();
        }

        function onStart(e) {
            if (e.target.id !== 'cropPreviewImg') return;
            const t = e.touches ? e.touches[0] : e;
            cropTemp.isDragging = true;
            cropTemp.lastX = t.clientX;
            cropTemp.lastY = t.clientY;
        }

        function onMove(e) {
            if (!cropTemp.isDragging) return;
            const t = e.touches ? e.touches[0] : e;
            cropTemp.x += (t.clientX - cropTemp.lastX) / viewScale;
            cropTemp.y += (t.clientY - cropTemp.lastY) / viewScale;
            cropTemp.lastX = t.clientX;
            cropTemp.lastY = t.clientY;
            renderCropPreview();
            e.preventDefault();
        }

        function onEnd() {
            if (!cropTemp.isDragging) return;
            cropTemp.isDragging = false;
            clampCropPosition();
            renderCropPreview();
        }

        async function exportPhoto() {
            const loading = document.getElementById('exportLoading');
            const area = document.getElementById('captureArea');
            const qualityScale = parseFloat(document.getElementById('exportQuality').value);
            loading.style.display = 'flex';
            try {
                const scaler = document.getElementById('scaler');
                const oldTransform = scaler.style.transform;
                scaler.style.transform = 'scale(1)';
                const canvas = await html2canvas(area, {
                    scale: qualityScale,
                    useCORS: true,
                    backgroundColor: '#ffffff',
                    logging: false
                });
                scaler.style.transform = oldTransform;
                const link = document.createElement('a');
                link.download = `Photo_6x4_polaroid_${Date.now()}.jpg`;
                link.href = canvas.toDataURL('image/jpeg', 0.95);
                link.click();
            } catch (err) {
                alert('导出失败，请重试');
            } finally {
                loading.style.display = 'none';
            }
        }

        window.addEventListener('resize', () => {
            autoScaleCanvas();
            if (document.getElementById('cropModal').style.display === 'flex') {
                recalcCropViewScale();
                renderCropPreview();
            }
        });
        window.addEventListener('load', () => {
            randomizeTexts();
            applyFont();
            selectCard(1);
            autoScaleCanvas();
        });
        document.addEventListener('mousedown', onStart);
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onEnd);
        document.addEventListener('touchstart', onStart, { passive: false });
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend', onEnd);
        document.getElementById('card1').addEventListener('dblclick', () => uploadPhoto(1));
        document.getElementById('card2').addEventListener('dblclick', () => uploadPhoto(2));
    </script>
</body>
</html>
